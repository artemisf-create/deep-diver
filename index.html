<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Deep Diver — Free Online Underwater Cave Game</title>
  <meta name="description" content="Deep Diver is a free browser game where you swim through underwater caves, dodge sharks and jellyfish, collect pearls and beat your friends' high scores. Play instantly, no download needed!">
  <meta name="keywords" content="deep diver, underwater game, browser game, free online game, cave game, html5 game, arcade game">
  <meta name="author" content="artemisf-create">
  <meta property="og:title" content="Deep Diver — Free Online Underwater Cave Game">
  <meta property="og:description" content="Swim through underwater caves, dodge sharks, collect pearls. Free browser game with friends leaderboard!">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://artemisf-create.github.io/deep-diver">
  <link rel="canonical" href="https://artemisf-create.github.io/deep-diver">
  <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body {
      width: 100%; height: 100%;
      background: #000;
      overflow: hidden;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }
    canvas {
      display: block;
      position: fixed;
      top: 0; left: 0;
      width: 100vw;
      height: 100vh;
    }
  </style>
  <style>
    #nameInput {
      display: none;
      position: fixed;
      left: 50%; top: 50%;
      transform: translate(-50%, -50%);
      z-index: 10;
      background: rgba(0,20,40,0.97);
      border: 2px solid #55aaff;
      border-radius: 14px;
      padding: 22px 28px;
      text-align: center;
      box-shadow: 0 0 30px rgba(80,180,255,0.4);
    }
    #nameInput p {
      color: #80dfff;
      font: bold 18px sans-serif;
      margin-bottom: 12px;
    }
    #nameInput input {
      background: rgba(255,255,255,0.1);
      border: 2px solid #55aaff;
      border-radius: 8px;
      color: #fff;
      font: bold 20px sans-serif;
      padding: 8px 14px;
      width: 220px;
      text-align: center;
      outline: none;
    }
    #nameInput button {
      display: block;
      margin: 12px auto 0;
      background: rgba(80,160,255,0.35);
      border: 2px solid #55aaff;
      border-radius: 8px;
      color: #fff;
      font: bold 16px sans-serif;
      padding: 8px 32px;
      cursor: pointer;
    }
    #nameInput button:hover { background: rgba(80,160,255,0.6); }

    #helpPanel {
      display: none;
      position: fixed;
      left: 50%; top: 50%;
      transform: translate(-50%, -50%);
      z-index: 10;
      background: rgba(0,15,35,0.98);
      border: 2px solid #80dfff;
      border-radius: 16px;
      padding: 24px 28px;
      width: min(420px, 92vw);
      box-shadow: 0 0 40px rgba(80,180,255,0.3);
      color: #fff;
      font-family: sans-serif;
    }
    #helpPanel h2 { color:#80dfff; font-size:20px; margin-bottom:16px; text-align:center; }
    #helpPanel .section { margin-bottom:14px; }
    #helpPanel .section h3 { color:#aaffcc; font-size:13px; margin-bottom:7px; text-transform:uppercase; letter-spacing:1px; }
    #helpPanel .row { display:flex; align-items:center; gap:10px; margin-bottom:6px; font-size:14px; }
    #helpPanel .key {
      background: rgba(255,255,255,.15); border:1px solid rgba(255,255,255,.3);
      border-radius:6px; padding:3px 9px; font:bold 13px monospace;
      color:#fff; white-space:nowrap; flex-shrink:0;
    }
    #helpPanel .desc { color:rgba(255,255,255,.8); }
    #helpPanel .tip { background:rgba(255,220,80,.08); border-left:3px solid #ffe680; padding:8px 12px; border-radius:0 8px 8px 0; font-size:13px; color:rgba(255,255,255,.75); margin-bottom:8px; }
    #helpClose { display:block; width:100%; margin-top:14px; background:rgba(80,160,255,.3); border:2px solid #55aaff; border-radius:8px; color:#fff; font:bold 15px sans-serif; padding:9px; cursor:pointer; }
    #helpClose:hover { background:rgba(80,160,255,.55); }

    #friendsPanel {
      display: none;
      position: fixed;
      left: 50%; top: 50%;
      transform: translate(-50%, -50%);
      z-index: 10;
      background: rgba(0,15,35,0.98);
      border: 2px solid #55aaff;
      border-radius: 16px;
      padding: 20px 24px;
      width: min(420px, 92vw);
      box-shadow: 0 0 40px rgba(80,180,255,0.35);
      color: #fff;
      font-family: sans-serif;
    }
    #friendsPanel h2 { color:#80dfff; font-size:20px; margin-bottom:14px; text-align:center; }
    #friendsList { max-height: 200px; overflow-y:auto; margin-bottom:14px; }
    #friendsList .fr {
      display:flex; justify-content:space-between; align-items:center;
      padding:7px 10px; border-radius:8px; margin-bottom:6px;
      background:rgba(255,255,255,.07);
    }
    #friendsList .fr .fname { font-weight:bold; color:#aaddff; }
    #friendsList .fr .fscore { color:#ffe680; font-weight:bold; }
    #friendsList .fr .fdel { cursor:pointer; color:#ff6666; font-size:18px; margin-left:10px; }
    #friendsList .empty { color:rgba(255,255,255,.4); text-align:center; padding:16px 0; font-size:14px; }
    .fp-row { display:flex; gap:8px; margin-bottom:10px; }
    .fp-row input {
      flex:1; background:rgba(255,255,255,.1); border:2px solid #55aaff;
      border-radius:8px; color:#fff; font-size:14px; padding:7px 10px; outline:none;
    }
    .fp-row button, #friendsPanel > button {
      background:rgba(80,160,255,.35); border:2px solid #55aaff;
      border-radius:8px; color:#fff; font:bold 14px sans-serif;
      padding:7px 14px; cursor:pointer; white-space:nowrap;
    }
    .fp-row button:hover, #friendsPanel > button:hover { background:rgba(80,160,255,.6); }
    #myCode {
      background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.2);
      border-radius:8px; padding:8px 12px; font-size:12px; color:#aaddff;
      word-break:break-all; margin-bottom:10px; cursor:pointer; text-align:center;
    }
    #myCode:hover { background:rgba(255,255,255,.15); }
    .fp-hint { font-size:11px; color:rgba(255,255,255,.4); text-align:center; margin-bottom:10px; }
    #friendsClose { display:block; width:100%; margin-top:4px; }
    #fpMsg { font-size:13px; color:#ff8888; text-align:center; min-height:18px; margin-bottom:4px; }

    #leaderboardPanel {
      display: none;
      position: fixed;
      left: 50%; top: 50%;
      transform: translate(-50%, -50%);
      z-index: 10;
      background: rgba(0,10,30,0.98);
      border: 2px solid #ffe680;
      border-radius: 16px;
      padding: 20px 24px;
      width: min(440px, 94vw);
      max-height: 90vh;
      box-shadow: 0 0 40px rgba(255,220,80,0.25);
      color: #fff;
      font-family: sans-serif;
      flex-direction: column;
    }
    #leaderboardPanel h2 { color:#ffe680; font-size:20px; margin-bottom:4px; text-align:center; }
    #lbSubtitle { font-size:12px; color:rgba(255,255,255,.4); text-align:center; margin-bottom:12px; }
    #lbList {
      flex: 1;
      overflow-y: auto;
      max-height: 55vh;
      margin-bottom: 12px;
    }
    #lbList .lr {
      display: flex;
      align-items: center;
      padding: 7px 10px;
      border-radius: 8px;
      margin-bottom: 5px;
      background: rgba(255,255,255,.06);
      gap: 8px;
    }
    #lbList .lr.me   { background: rgba(255,220,80,.15); border: 1px solid rgba(255,220,80,.4); }
    #lbList .lr.friend { background: rgba(80,200,255,.1); border: 1px solid rgba(80,200,255,.3); }
    #lbList .lr .lrank { color:rgba(255,255,255,.45); width:24px; text-align:right; flex-shrink:0; font-size:13px; }
    #lbList .lr .lname { flex:1; font-weight:bold; color:#cceeff; font-size:14px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    #lbList .lr .lscore { color:#ffe680; font-weight:bold; font-size:14px; flex-shrink:0; }
    #lbList .lr .ltag { font-size:11px; margin-left:4px; }
    #lbLoading { text-align:center; color:rgba(255,255,255,.4); padding:20px 0; font-size:14px; }
    #leaderboardPanel button { display:block; width:100%; background:rgba(255,220,80,.2); border:2px solid #ffe680; border-radius:8px; color:#fff; font:bold 15px sans-serif; padding:9px; cursor:pointer; }
    #leaderboardPanel button:hover { background:rgba(255,220,80,.4); }

    /* ── Race panels ── */
    .race-panel {
      display: none; position: fixed; left:50%; top:50%;
      transform: translate(-50%,-50%); z-index:10;
      background: rgba(0,10,25,0.98); border-radius:16px;
      padding:28px 32px; width:min(380px,92vw);
      color:#fff; font-family:sans-serif; text-align:center;
      box-shadow: 0 0 50px rgba(255,100,0,0.3);
    }
    #raceLookingPanel { border:2px solid #ff8800; }
    #raceChallengePanel { border:2px solid #ff4444; }
    #raceCountdownPanel { border:2px solid #44ffaa; }
    .race-panel h2 { font-size:22px; margin-bottom:10px; }
    .race-panel p  { color:rgba(255,255,255,.7); font-size:14px; margin-bottom:16px; }
    .race-panel .spinner { font-size:36px; animation: spin 1s linear infinite; display:inline-block; margin-bottom:10px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .race-panel .rbtn {
      display:inline-block; margin:6px; padding:10px 24px;
      border-radius:10px; border:2px solid; font:bold 15px sans-serif;
      cursor:pointer; color:#fff;
    }
    .rbtn-green  { background:rgba(80,220,120,.25); border-color:#44dd88; }
    .rbtn-green:hover  { background:rgba(80,220,120,.5); }
    .rbtn-red    { background:rgba(220,60,60,.25);  border-color:#ff4444; }
    .rbtn-red:hover    { background:rgba(220,60,60,.5); }
    .rbtn-grey   { background:rgba(255,255,255,.1); border-color:rgba(255,255,255,.3); }
    .rbtn-grey:hover   { background:rgba(255,255,255,.2); }
    #raceCountNum { font-size:80px; font-weight:bold; color:#44ffaa; line-height:1; }
  </style>
</head>
<body>
<canvas id="game"></canvas>

<!-- Race panels -->
<div id="raceLookingPanel" class="race-panel">
  <div class="spinner">🌀</div>
  <h2 id="rlTitle">Looking for opponent…</h2>
  <p id="rlSub">Searching for a free player</p>
  <div class="rbtn rbtn-grey" id="rlCancel">Cancel</div>
</div>
<div id="raceChallengePanel" class="race-panel">
  <div style="font-size:36px;margin-bottom:8px">⚡</div>
  <h2 id="rcTitle">Challenge!</h2>
  <p id="rcSub"></p>
  <div class="rbtn rbtn-green" id="rcAccept">Accept</div>
  <div class="rbtn rbtn-red"   id="rcReject">Decline</div>
</div>
<div id="raceCountdownPanel" class="race-panel">
  <p id="rcdSub" style="font-size:16px;color:#aaffcc;margin-bottom:4px"></p>
  <div id="raceCountNum">3</div>
</div>

<div id="helpPanel">
  <h2 id="helpTitle">❓ How to play</h2>
  <div class="section">
    <h3 id="helpCtrlTitle">Controls</h3>
    <div class="row"><span class="key">W A S D</span><span class="desc" id="h1"></span></div>
    <div class="row"><span class="key">↑ ← ↓ →</span><span class="desc" id="h2"></span></div>
    <div class="row"><span class="key">Hold LMB</span><span class="desc" id="h3"></span></div>
    <div class="row"><span class="key">P / ESC</span><span class="desc" id="h4"></span></div>
  </div>
  <div class="section">
    <h3 id="helpGoalTitle">Goal</h3>
    <div class="tip" id="helpGoal"></div>
  </div>
  <div class="section">
    <h3 id="helpItemsTitle">Items</h3>
    <div class="row"><span>🟡</span><span class="desc" id="hi1"></span></div>
    <div class="row"><span>🫧</span><span class="desc" id="hi2"></span></div>
    <div class="row"><span>🦈</span><span class="desc" id="hi3"></span></div>
    <div class="row"><span>💀</span><span class="desc" id="hi4"></span></div>
  </div>
  <button id="helpClose">OK</button>
</div>

<div id="leaderboardPanel">
  <h2 id="lbTitle">🏆 Leaderboard</h2>
  <p id="lbSubtitle"></p>
  <div id="lbList"><div id="lbLoading">Loading…</div></div>
  <button id="lbClose">Close</button>
</div>

<div id="friendsPanel">
  <h2 id="fpTitle">👥 Friends</h2>
  <div id="friendsList"></div>
  <p id="fpMyCode" style="color:#80dfff;font-size:13px;margin-bottom:6px;text-align:center"></p>
  <div id="myCode" title="Click to copy">…</div>
  <p class="fp-hint" id="fpHint">Share this code with friends. Click to copy.</p>
  <div class="fp-row">
    <input id="friendCodeInput" type="text" placeholder="Paste friend's code…" autocomplete="off">
    <button id="addFriendBtn">Add</button>
  </div>
  <p id="fpMsg"></p>
  <button id="friendsClose">Close</button>
</div>

<div id="nameInput">
  <p id="nameInputLabel">Enter your name:</p>
  <input id="nameField" type="text" maxlength="16" autocomplete="off" spellcheck="false">
  <button id="nameConfirm">OK</button>
</div>

<!-- roundRect polyfill for old Safari (iOS < 15.4) -->
<script>
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
    r = Array.isArray(r) ? r[0] : (r || 0);
    r = Math.min(r, w / 2, h / 2);
    this.moveTo(x + r, y);
    this.lineTo(x + w - r, y);
    this.arcTo(x + w, y,     x + w, y + r,     r);
    this.lineTo(x + w, y + h - r);
    this.arcTo(x + w, y + h, x + w - r, y + h, r);
    this.lineTo(x + r, y + h);
    this.arcTo(x,      y + h, x,        y + h - r, r);
    this.lineTo(x, y + r);
    this.arcTo(x,      y,     x + r,    y,         r);
    this.closePath();
  };
}
</script>

<script type="module" src="src/main.js?v=2"></script>
</body>
</html>
