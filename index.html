<script>
// РџРѕР»РёС„РёР» roundRect РґР»СЏ СЃС‚Р°СЂС‹С… Safari (iPad / iPhone РґРѕ iOS 15.4)
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
    r = Array.isArray(r) ? r[0] : (r || 0);
    r = Math.min(r, w / 2, h / 2);
    this.moveTo(x + r, y);
    this.lineTo(x + w - r, y);
    this.arcTo(x + w, y,     x + w, y + r,     r);
    this.lineTo(x + w, y + h - r);
    this.arcTo(x + w, y + h, x + w - r, y + h, r);
    this.lineTo(x + r, y + h);
    this.arcTo(x,      y + h, x,        y + h - r, r);
    this.lineTo(x, y + r);
    this.arcTo(x,      y,     x + r,    y,         r);
    this.closePath();
  };
}

// РќР° iPadOS 13+ СЋР·РµСЂ-Р°РіРµРЅС‚ РїСЂРёС‚РІРѕСЂСЏРµС‚СЃСЏ РґРµСЃРєС‚РѕРїРѕРј — РѕРїСЂРµРґРµР»СЏРµРј РїРѕ С‚Р°С‡-РїРѕРёРЅС‚Р°Рј
const isMobile = /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent)
              || (navigator.maxTouchPoints > 1);
const canvas = document.getElementById('game');
const ctx    = canvas.getContext('2d');

let W = window.innerWidth;
let H = window.innerHeight;
canvas.width  = W;
canvas.height = H;

// РљРѕРЅСЃС‚Р°РЅС‚С‹ РєРѕРЅС‚СЂРѕР»РѕРІ — РЅСѓР¶РЅС‹ РґРѕ updateVP
const JOY_R = 55;
const DPAD  = { size: isMobile ? (window.screen.height < 500 || window.screen.width < 500 ? 34 : 44) : 58, gap: 4 };

// РРіСЂРѕРІРѕР№ РІСЊСЋРїРѕСЂС‚ — РѕР±Р»Р°СЃС‚СЊ РіРґРµ СЂРµРЅРґРµСЂРёС‚СЃСЏ Р»Р°Р±РёСЂРёРЅС‚
let VP = { x: 0, y: 0, w: W, h: H };
function updateVP() {
  const pad = isMobile ? 6 : 0;
  let bottom = H - pad;
  if (isMobile) {
    // РќРёР¶РЅСЏСЏ РіСЂР°РЅРёС†Р° СЃРѕРІРїР°РґР°РµС‚ СЃ РЅРёР¶РЅРёРј РєСЂР°РµРј РєРЅРѕРїРѕРє ◀▶
    const s = DPAD.size, g = DPAD.gap, margin = 10;
    const dpadLRBottom = H - s - g - margin;      // РЅРёР¶РЅРёР№ РєСЂР°Р№ ◀▶
    const joyBottom    = H - 15;                   // РЅРёР¶РЅРёР№ РєСЂР°Р№ РґР¶РѕР№СЃС‚РёРєР°
    bottom = Math.min(dpadLRBottom, joyBottom) + 4;
  }
  VP.x = pad; VP.y = pad; VP.w = W - pad * 2; VP.h = bottom - pad;
}
updateVP();

window.addEventListener('resize', () => {
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = W; canvas.height = H;
  ROWS = Math.ceil(H / T) + 2;
  updateVP();
});

// в”Ђв”Ђв”Ђ Tile config в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
const T    = isMobile ? 28 : 48;
let   ROWS = Math.ceil(H / T) + 2;
const POOL = 800;                        // circular column buffer

// Tile types
const AIR  = 0;
const WALL = 1;

// grid[col % POOL][row]
let grid      = [];
let decorData = [];  // grid[col % POOL][row] = decoration object or null

// в”Ђв”Ђв”Ђ Generation state в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
let genCol  = 0;
let pathY   = Math.floor(ROWS / 2);  // center row of corridor
let pathH   = 3;                      // half-height (tiles)
let branchY = -1, branchCol = -1;

// Difficulty: spawns get denser with distance
function difficulty(col) { return Math.min(1, (col / 800) * (1 + (level - 1) * 0.3)); }

function initGrid() {
  grid = [];
  decorData = [];
  for (let c = 0; c < POOL; c++) {
    grid.push(new Uint8Array(ROWS));
    decorData.push(new Array(ROWS).fill(null));
  }
}

function generateUntil(targetCol) {
  while (genCol < targetCol) {
    const ci = genCol % POOL;
    const col = grid[ci];
    const dec = decorData[ci];
    col.fill(WALL);
    for (let r = 0; r < ROWS; r++) dec[r] = null;

    // Path drift — gradually descend over time
    if (Math.random() < 0.18) pathY += 1;          // bias downward
    if (Math.random() < 0.10) pathY -= 1;
    if (Math.random() < 0.08) pathH = pathH === 2 ? 3 : (pathH === 3 ? (Math.random() < 0.5 ? 2 : 4) : 3);
    pathY = Math.max(pathH + 1, Math.min(ROWS - pathH - 2, pathY));

    // Carve main corridor
    for (let r = pathY - pathH; r <= pathY + pathH; r++) {
      if (r >= 0 && r < ROWS) col[r] = AIR;
    }

    // Occasional branch corridor
    if (branchCol < 0 && Math.random() < 0.035 && genCol > 40) {
      branchCol = genCol;
      branchY   = pathY > ROWS / 2
        ? Math.floor(Math.random() * (pathY - pathH - 3) + 1)
        : pathY + pathH + 2 + Math.floor(Math.random() * 3);
      branchY = Math.max(2, Math.min(ROWS - 3, branchY));
    }
    if (branchCol >= 0) {
      if (Math.random() < 0.12) branchY += Math.random() < 0.5 ? -1 : 1;
      branchY = Math.max(2, Math.min(ROWS - 3, branchY));
      for (let r = branchY - 2; r <= branchY + 2; r++) {
        if (r >= 0 && r < ROWS) col[r] = AIR;
      }
      if (genCol - branchCol > 15 + Math.random() * 25) {
        // vertical connector
        const lo = Math.min(pathY - pathH, branchY - 2);
        const hi = Math.max(pathY + pathH, branchY + 2);
        for (let r = lo; r <= hi; r++) if (r >= 0 && r < ROWS) col[r] = AIR;
        branchCol = -1;
      }
    }

    // Wall decorations
    for (let r = 0; r < ROWS; r++) {
      if (col[r] === WALL && Math.random() < 0.07)
        dec[r] = { type: 'decor', kind: Math.floor(Math.random() * 3), phase: Math.random() * Math.PI * 2 };
    }

    // Collectibles & enemies (density rises with difficulty)
    const diff = difficulty(genCol);
    const airRows = [];
    for (let r = 0; r < ROWS; r++) if (col[r] === AIR) airRows.push(r);
    if (!airRows.length) { genCol++; continue; }

    const pick = () => airRows[Math.floor(Math.random() * airRows.length)];

    // Pearl — every ~6 cols
    if (genCol > 5 && genCol % 6 === 0 && Math.random() < 0.7) {
      const r = pick();
      if (!dec[r]) dec[r] = { type: 'pearl', phase: Math.random() * Math.PI * 2, collected: false };
    }

    // Bubble (O₂) — every ~14 cols, more common with depth
    if (genCol > 10 && genCol % 14 === 0 && Math.random() < 0.65) {
      const r = pick();
      if (!dec[r]) dec[r] = { type: 'bubble', phase: Math.random() * Math.PI * 2, collected: false };
    }

    // Shark — spawns more often as difficulty rises
    const sharkInterval = Math.round(30 - diff * 18);  // 30 в†' 12
    if (genCol > 50 && genCol % sharkInterval === 0 && Math.random() < 0.6 + diff * 0.3) {
      const r = pick();
      if (!dec[r]) dec[r] = { type: 'shark', vy: (Math.random() < 0.5 ? 1 : -1) * (0.5 + diff * 1.2), py: r * T + T / 2, px: genCol * T + T / 2, vx: 0, aggroed: false };
    }

    // Jellyfish — spawns more with difficulty
    const jellyInterval = Math.round(28 - diff * 15);  // 28 в†' 13
    if (genCol > 70 && genCol % jellyInterval === 0 && Math.random() < 0.55 + diff * 0.35) {
      const r = pick();
      if (!dec[r]) dec[r] = { type: 'jelly', phase: Math.random() * Math.PI * 2, py: r * T + T / 2, px: genCol * T + T / 2, vx: 0, vy: 0, aggroed: false };
    }

    // Mine — appears at depth (diff > 0.4)
    if (diff > 0.4 && genCol % 40 === 0 && Math.random() < diff * 0.6) {
      const r = pick();
      if (!dec[r]) dec[r] = { type: 'mine', phase: Math.random() * Math.PI * 2 };
    }

    genCol++;
  }
}

// в”Ђв”Ђв”Ђ Camera в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
let camXpx   = 0;   // world-x of left edge
let camYpx   = 0;   // world-y of top edge (follows player vertically)

// Gun — децентрализованная P2P база, работает через публичные relay-серверы
const gun = Gun(['https://relay.peer.ooo/gun',
                 'https://gun.eco/gun']);
const playersDB = gun.get('deepdiver-v1-players');

// Публикуем свой рекорд в сеть
function syncMyScore() {
  if (!playerName) return;
  playersDB.get(playerId).put({ n: playerName, s: hiScore, t: Date.now() });
}

let friends = JSON.parse(localStorage.getItem('deepdiver_friends') || '[]');
// friends = [{id, n, s}]
const gunSubs = {}; // активные подписки Gun по friendId

function saveFriends() { localStorage.setItem('deepdiver_friends', JSON.stringify(friends)); }

// Подписываемся на обновления конкретного друга через Gun
function subscribeFriend(friendId) {
  if (gunSubs[friendId]) return; // уже подписаны
  gunSubs[friendId] = playersDB.get(friendId).on(function(data) {
    if (!data || !data.n) return;
    const idx = friends.findIndex(function(f){ return f.id === friendId; });
    if (idx < 0) return;
    const changed = friends[idx].n !== data.n || friends[idx].s !== data.s;
    friends[idx].n = data.n;
    friends[idx].s = data.s || 0;
    if (changed) { saveFriends(); renderFriendsList(); }
  });
}

// Подписываемся на всех друзей при старте
function subscribeAllFriends() {
  friends.forEach(function(f){ subscribeFriend(f.id); });
}
subscribeAllFriends();

// Отправляем свой ID в "входящие" к другу
function sendFriendRequest(toId) {
  playersDB.get(toId).get('reqs').get(playerId).put({ from: playerId, t: Date.now() });
}

// Слушаем входящие запросы — если кто-то добавил нас, добавляем его в ответ
function listenIncomingRequests() {
  playersDB.get(playerId).get('reqs').map().on(function(data) {
    if (!data || !data.from) return;
    const fid = data.from;
    if (fid === playerId) return;
    if (friends.find(function(f){ return f.id === fid; })) return; // уже есть
    // Автоматически добавляем
    friends.push({ id: fid, n: '…', s: 0 });
    saveFriends();
    subscribeFriend(fid);
    renderFriendsList();
  });
}
listenIncomingRequests();

// Подписываемся на всех игроков в базе — Gun стримит обновления
playersDB.map().on(function(data, id) {
  if (!data || !data.n || !data.s) return;
  if (id === '_') return; // служебный ключ Gun
  allPlayers[id] = { n: data.n, s: data.s };
  if (lbPanel.style.display !== 'none') renderLeaderboard();
});

function renderLeaderboard() {
  const ru = lang === 'ru';
  const friendIds = new Set(friends.map(function(f){ return f.id; }));
  const rows = Object.entries(allPlayers)
    .map(function(e){ return { id: e[0], n: e[1].n, s: e[1].s }; })
    .sort(function(a,b){ return b.s - a.s; })
    .slice(0, 100);

  if (!rows.length) {
    lbList.innerHTML = '<div id="lbLoading">' + (ru ? 'Загрузка…' : 'Loading…') + '</div>';
    return;
  }

  const myRank = rows.findIndex(function(r){ return r.id === playerId; });

  lbList.innerHTML = rows.map(function(r, i) {
    const isMe     = r.id === playerId;
    const isFriend = friendIds.has(r.id);
    const medal    = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : (i+1) + '.';
    const tag      = isMe ? (ru ? ' 👤вы' : ' 👤you') : isFriend ? ' 🤝' : '';
    const cls      = isMe ? 'lr me' : isFriend ? 'lr friend' : 'lr';
    return '<div class="' + cls + '">' +
      '<span class="lrank">' + medal + '</span>' +
      '<span class="lname">🤿 ' + r.n + '<span class="ltag">' + tag + '</span></span>' +
      '<span class="lscore">◆ ' + r.s + '</span>' +
    '</div>';
  }).join('');

  lbSub.textContent = ru
    ? (rows.length + ' игроков' + (myRank >= 0 ? ' · ваше место: #' + (myRank+1) : ''))
    : (rows.length + ' players' + (myRank >= 0 ? ' · your rank: #' + (myRank+1) : ''));
}

  const ru = lang === 'ru';
  lbTitle.textContent = ru ? '🏆 Таблица лидеров' : '🏆 Leaderboard';
  lbClose.textContent = ru ? 'Закрыть' : 'Close';

  lbPanel.style.display = 'flex';
}

document.addEventListener('keydown', e => {
  keys[e.key] = true;
  if ((e.key === 'p' || e.key === 'P' || e.key === 'Escape') && state === 'play') paused = !paused;

  if (e.key === ' ' || e.code === 'Space') {
    if (state === 'play') paused = !paused;
    else if (state === 'dead') startGame();
    else if (state === 'win') startGame();

  }
  if (e.key === ' ') e.preventDefault();
});
document.addEventListener('keyup', e => { keys[e.key] = false; });

function updateMouse(clientX, clientY) {
  const r = canvas.getBoundingClientRect();
  mouse.x = (clientX - r.left) * (W / r.width);
  mouse.y = (clientY - r.top)  * (H / r.height);
}
canvas.addEventListener('mousemove', e => updateMouse(e.clientX, e.clientY));
canvas.addEventListener('mousedown', e => {
  updateMouse(e.clientX, e.clientY);
  if (state === 'menu') {
    const r = canvas.getBoundingClientRect();
    const cx = (e.clientX - r.left) * (W / r.width);
    const cy = (e.clientY - r.top)  * (H / r.height);
    checkMenuButtons(cx, cy); return;
  }
  if (state === 'dead') {
    const r = canvas.getBoundingClientRect();
    const cx = (e.clientX - r.left) * (W / r.width);
    const cy = (e.clientY - r.top)  * (H / r.height);
    const mb = window._menuBackBtn;
    if (mb && cx>=mb.x && cx<=mb.x+mb.w && cy>=mb.y && cy<=mb.y+mb.h) {
      state = 'menu'; return;
    }
    startGame(); return;
  }
  if (state === 'play' && paused) {
    const r = canvas.getBoundingClientRect();
    const cx = (e.clientX - r.left) * (W / r.width);
    const cy = (e.clientY - r.top)  * (H / r.height);
    const pb = window._pauseMenuBtn;
    if (pb && cx>=pb.x && cx<=pb.x+pb.w && cy>=pb.y && cy<=pb.y+pb.h) {
      paused = false; state = 'menu'; return;
    }
  }
  if (state === 'win') {
    const r = canvas.getBoundingClientRect();
    const cx = (e.clientX - r.left) * (W / r.width);
    const cy = (e.clientY - r.top)  * (H / r.height);
    const wb = window._winMenuBtn;
    if (wb && cx>=wb.x && cx<=wb.x+wb.w && cy>=wb.y && cy<=wb.y+wb.h) { state='menu'; return; }
    startGame(); return;
  }
  mouse.down = true;
  if (state === 'levelup') { level++; wins = 0; startGame(); }
});
canvas.addEventListener('mouseup', () => { mouse.down = false; });
// Touch handlers — consolidated below near dpad code

// в”Ђв”Ђв”Ђ Start / Reset в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function startGame() {
  initGrid();
  genCol = 0; pathY = Math.floor(ROWS / 2); pathH = 3; branchCol = -1;
  generateUntil(POOL);

  camSpeed = isMobile ? 0.6 : 1.2;

  // Find a safe AIR tile to spawn in (scan column 2)
  const spawnCol = 2;
  let spawnRow = Math.floor(ROWS / 2);
  for (let delta = 0; delta < ROWS; delta++) {
    const r1 = Math.floor(ROWS/2) + delta;
    const r2 = Math.floor(ROWS/2) - delta;
    if (r1 < ROWS && grid[spawnCol % POOL][r1] === AIR) { spawnRow = r1; break; }
    if (r2 >= 0  && grid[spawnCol % POOL][r2] === AIR) { spawnRow = r2; break; }
  }
  player.x = spawnCol * T + T / 2;
  player.y = spawnRow * T + T / 2;
  // РљР°РјРµСЂР° СЃСЂР°Р·Сѓ РЅР° РёРіСЂРѕРєР°
  updateVP();
  camXpx = Math.max(0, player.x - VP.w / 2);
  camYpx = Math.max(0, player.y - VP.h / 2);
  player.vx = 0; player.vy = 0;
  player.dead = false; player.invincible = 0;

  score = 0; distM = 0; oxygen = 100; oxyTick = 0;
  lives = gameMode === 'sandbox' ? 999 : 3; lastCheckpointCamX = 0; lastCheckpointX = player.x; lastCheckpointY = player.y;
  lastCheckpointDist = 0; nextCheckpointM = 60;
  frame = 0; swimPhase = 0; particles = [];
  paused = false;
  state = 'play';
}

function fullReset() {
  wins = 0; level = 1;
  startGame();
}

// в”Ђв”Ђв”Ђ Helpers в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function rand(a, b) { return a + Math.random() * (b - a); }
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

function spawnFx(wx, wy, color, n = 8) {
  const sx = wx - camXpx, sy = wy - camYpx;
  for (let i = 0; i < n; i++) {
    const a = rand(0, Math.PI * 2), sp = rand(1, 4);
    particles.push({ x: sx, y: sy, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp, life: 1, color, r: rand(2, 5) });
  }
}

// Tile at world position (wx, wy)
function tileAt(wx, wy) {
  const c = Math.floor(wx / T);
  const r = Math.floor(wy / T);
  if (c < 0 || r < 0 || r >= ROWS) return WALL;
  return grid[c % POOL][r];
}

function collidesWall(wx, wy, hw, hh) {
  const corners = [
    [wx - hw, wy - hh], [wx + hw - 1, wy - hh],
    [wx - hw, wy + hh - 1], [wx + hw - 1, wy + hh - 1],
  ];
  return corners.some(([x, y]) => tileAt(x, y) === WALL);
}

// в”Ђв”Ђв”Ђ Update в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function drawPause() {
  // Р'СЃС' РІ СЌРєСЂР°РЅРЅС‹С… РєРѕРѕСЂРґРёРЅР°С‚Р°С…
  const sx = VP.x, sy = VP.y, sw = VP.w, sh = VP.h;
  const cx = sx + sw / 2, cy = sy + sh / 2;
  const sz = Math.round(Math.min(48, sh * 0.13));

  ctx.fillStyle = 'rgba(0,0,0,.55)'; ctx.fillRect(sx, sy, sw, sh);

  ctx.fillStyle = '#fff'; ctx.font = `bold ${sz}px sans-serif`; ctx.textAlign = 'center';
  ctx.fillText(t('paused'), cx, cy - 30);
  ctx.font = `${Math.round(sz*0.4)}px sans-serif`; ctx.fillStyle = '#aaddff';
  ctx.fillText(t('resume_hint'), cx, cy + 10);

  // РљРЅРѕРїРєР° РіР»Р°РІРЅРѕРіРѕ РјРµРЅСЋ
  const bw = Math.min(220, sw * 0.55), bh = Math.round(sz * 0.75);
  const bx = cx - bw/2, by = cy + 30;
  ctx.fillStyle = 'rgba(255,255,255,.12)';
  ctx.strokeStyle = 'rgba(255,255,255,.45)'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.roundRect(bx, by, bw, bh, 10); ctx.fill(); ctx.stroke();
  ctx.fillStyle = '#fff'; ctx.font = `bold ${Math.round(sz*0.38)}px sans-serif`;
  ctx.fillText(t('menu_btn'), cx, by + bh * 0.65);
  window._pauseMenuBtn = { x: bx, y: by, w: bw, h: bh };
}

function update() {
  if (paused) return;
  frame++; worldFrame++;
  swimPhase += 0.14;

  // Camera scroll
  if (!player.dead) {
    if (gameMode === 'sandbox') {
      // Плавно следуем за игроком по X
      const targetCamX = player.x - VP.w / 2;
      camXpx += (targetCamX - camXpx) * 0.08;
      camXpx = Math.max(0, camXpx);
      camSpeed = 0;
      distM = Math.floor(player.x / 40);
    } else {
      camSpeed = Math.min(isMobile ? 2.0 : 4.0, camSpeed + 0.0004);
      camXpx  += camSpeed;
      distM    = Math.floor(camXpx / 40);
    }
  }

  // Generate ahead
  generateUntil(Math.floor(camXpx / T) + Math.ceil(W / T) + 12);

  // Camera Y smoothly follows player
  const targetCamY = player.y - VP.h / 2;
  camYpx += (targetCamY - camYpx) * 0.08;
  camYpx = clamp(camYpx, 0, ROWS * T - VP.h);

  // Oxygen
  oxyTick++;
  if (!player.dead && oxyTick % 95 === 0) oxygen = Math.max(0, oxygen - 1);
  if (oxygen <= 0 && !player.dead) killPlayer();

  // в”Ђв”Ђ Player movement в”Ђв”Ђ
  const ACCEL = 0.55 + Math.floor(distM / 100) * 0.1, FRIC = 0.84;
  let ax = 0, ay = 0;

  if (keys['ArrowRight'] || keys['d'] || keys['D']) ax += 1;
  if (keys['ArrowLeft']  || keys['a'] || keys['A']) ax -= 2.2;
  if (keys['ArrowDown']  || keys['s'] || keys['S']) ay += 1;
  if (keys['ArrowUp']    || keys['w'] || keys['W']) ay -= 1;

  if (mouse.down) {
    const wx = mouse.x + camXpx, wy = mouse.y + camYpx;
    const dx = wx - player.x, dy = wy - player.y;
    const d  = Math.sqrt(dx * dx + dy * dy);
    if (d > 8) { ax += (dx / d) * 1.6; ay += (dy / d) * 1.6; }
  }
  if (controlMode === 'joystick' && joy.active) {
    ax += joy.dx * (joy.dx > 0 ? 1.0 : 2.2);
    ay += joy.dy * 1.0;
  }

  player.vx = player.vx * FRIC + ax * ACCEL + camSpeed * 0.15;
  player.vy = player.vy * FRIC + ay * ACCEL + 0.04;

  const spd = Math.sqrt(player.vx ** 2 + player.vy ** 2);
  if (spd > 6.0) { player.vx *= 6.0 / spd; player.vy *= 6.0 / spd; }

  // Move X, resolve
  player.x += player.vx;
  if (collidesWall(player.x, player.y, player.hw, player.hh)) {
    player.x -= player.vx; player.vx = 0;
  }
  // Move Y, resolve
  player.y += player.vy;
  if (collidesWall(player.x, player.y, player.hw, player.hh)) {
    player.y -= player.vy; player.vy = 0;
  }

  player.y = clamp(player.y, player.hh, ROWS * T - player.hh);

  // Left wall = camera left edge (auto-scroll pushes you; in sandbox camera follows so no push)
  const leftBound  = gameMode === 'sandbox' ? player.hw : camXpx + player.hw + 2;
  const rightBound = camXpx + VP.w - player.hw - 2;
  if (player.x < leftBound) {
    player.x = leftBound;
    player.vx = Math.max(player.vx, 0);
    // Если камера затолкала в стену — ищем ближайший AIR тайл
    if (collidesWall(player.x, player.y, player.hw, player.hh)) {
      const baseCol = Math.floor(player.x / T);
      const baseRow = Math.floor(player.y / T);
      let found = false;
      outer: for (let r = 0; r <= 6; r++) {
        for (let dc = 0; dc <= 3; dc++) {
          for (const dr of (r === 0 ? [0] : [r, -r])) {
            const c = baseCol + dc;
            const row = clamp(baseRow + dr, 0, ROWS - 1);
            if (grid[c % POOL][row] === 0) {
              player.x = c * T + T / 2;
              player.y = row * T + T / 2;
              found = true; break outer;
            }
          }
        }
      }
    }
  }
  if (player.x > rightBound) player.x = rightBound;

  if (player.invincible > 0) player.invincible--;

  // в”Ђв”Ђ Collectibles & enemies в”Ђв”Ђ
  const colLo = Math.floor(camXpx / T) - 1;
  const colHi = Math.floor((camXpx + W) / T) + 1;

  for (let c = colLo; c <= colHi; c++) {
    if (c < 0) continue;
    const ci = c % POOL;
    const dec = decorData[ci];

    for (let r = 0; r < ROWS; r++) {
      const d = dec[r];
      if (!d || d.type === 'decor') continue;

      const wx = c * T + T / 2;
      const wy = r * T + T / 2;

      if (d.type === 'pearl' && !d.collected) {
        const dx = player.x - wx, dy = player.y - wy;
        if (dx*dx + dy*dy < (player.hw + 7)**2) {
          d.collected = true; score += 10;
          spawnFx(wx, wy, '#ffe680', 6);
        }
      }

      if (d.type === 'bubble' && !d.collected) {
        const dx = player.x - wx, dy = player.y - wy;
        if (dx*dx + dy*dy < (player.hw + 9)**2) {
          d.collected = true; oxygen = Math.min(100, oxygen + 12.5);
          spawnFx(wx, wy, '#80dfff', 8);
        }
      }

      if (d.type === 'shark') {
        if (d.px === undefined) d.px = wx;
        if (d.vx === undefined) d.vx = 0;
        const AGGRO_DIST = 160, DEAGGRO_DIST = 600;
        const dxP = player.x - d.px, dyP = player.y - d.py;
        const distP = Math.sqrt(dxP*dxP + dyP*dyP);
        if (!d.aggroed && distP < AGGRO_DIST) { d.aggroed = true; spawnFx(d.px, d.py, '#ff4444', 4); }
        if (d.aggroed && distP > DEAGGRO_DIST) d.aggroed = false;

        if (d.aggroed) {
          // Chase player
          const spd = (isMobile ? 1.4 : 2.8) + difficulty(c) * (isMobile ? 0.8 : 1.5);
          d.vx += (dxP / distP) * 0.35;
          d.vy += (dyP / distP) * 0.35;
          const s = Math.sqrt(d.vx*d.vx + d.vy*d.vy);
          if (s > spd) { d.vx *= spd/s; d.vy *= spd/s; }
        } else {
          // Patrol vertically
          d.vx *= 0.85;
          d.vy = (Math.abs(d.vy) < 0.3 ? (Math.random()<0.5?1:-1) : d.vy > 0 ? 1 : -1) * (0.5 + difficulty(c) * 1.2);
        }

        d.px += d.vx;
        d.py += d.vy;
        // Wall bounce
        if (tileAt(d.px, d.py) === WALL) { d.vx *= -1; d.vy *= -1; d.px += d.vx*2; d.py += d.vy*2; }
        d.py = clamp(d.py, T, (ROWS-1)*T);

        if (player.invincible === 0 && !player.dead) {
          const dx2 = player.x - d.px, dy2 = player.y - d.py;
          if (Math.abs(dx2) < 26 && Math.abs(dy2) < 14) killPlayer();
        }
      }

      if (d.type === 'jelly') {
        if (d.px === undefined) d.px = wx;
        if (d.vx === undefined) d.vx = 0;
        if (d.vy === undefined) d.vy = 0;
        const AGGRO_DIST = 130, DEAGGRO_DIST = 500;
        const dxP = player.x - d.px, dyP = player.y - d.py;
        const distP = Math.sqrt(dxP*dxP + dyP*dyP);
        if (!d.aggroed && distP < AGGRO_DIST) { d.aggroed = true; spawnFx(d.px, d.py, '#dd44ff', 4); }
        if (d.aggroed && distP > DEAGGRO_DIST) d.aggroed = false;

        if (d.aggroed) {
          // Chase — slower but relentless
          const spd = (isMobile ? 1.1 : 2.2) + difficulty(c) * (isMobile ? 0.6 : 1.2);
          d.vx += (dxP / distP) * 0.18;
          d.vy += (dyP / distP) * 0.18;
          const s = Math.sqrt(d.vx*d.vx + d.vy*d.vy);
          if (s > spd) { d.vx *= spd/s; d.vy *= spd/s; }
          d.phase += 0.06; // faster pulse when aggroed
        } else {
          // Idle drift
          d.vx *= 0.9;
          d.vy *= 0.9;
          d.phase += 0.025;
          d.px = wx + Math.sin(d.phase) * (T * 0.9);
          d.py = r * T + T/2 + Math.cos(d.phase * 0.7) * (T * 0.5);
        }

        if (d.aggroed) {
          d.px += d.vx;
          d.py += d.vy;
          if (tileAt(d.px, d.py) === WALL) { d.vx *= -0.5; d.vy *= -0.5; d.px -= d.vx; d.py -= d.vy; }
          d.py = clamp(d.py, T, (ROWS-1)*T);
        }

        if (player.invincible === 0 && !player.dead) {
          const dx2 = player.x - d.px, dy2 = player.y - d.py;
          if (dx2*dx2 + dy2*dy2 < 22*22) killPlayer();
        }
      }

      if (d.type === 'mine') {
        if (player.invincible === 0 && !player.dead) {
          const dx = player.x - wx, dy = player.y - wy;
          if (dx*dx + dy*dy < 20*20) killPlayer();
        }
      }
    }
  }

  // Particles
  for (const p of particles) {
    p.x += p.vx; p.y += p.vy; p.vx *= 0.91; p.vy *= 0.91; p.life -= 0.04;
  }
  particles = particles.filter(p => p.life > 0);

  // Win condition — 1000 metres (С‚РѕР»СЊРєРѕ РІ РїСЂРѕС…РѕР¶РґРµРЅРёРё)
  if (gameMode === 'campaign' && !player.dead && distM >= 500) {
    player.dead = true;
    wins++;
    if (score > hiScore) hiScore = score;
    saveProgress();
    setTimeout(() => { state = wins >= 5 ? 'levelup' : 'win'; }, 800);
    return;
  }

  // Checkpoint detection
  if (!player.dead && distM >= nextCheckpointM) {
    lastCheckpointCamX = camXpx;
    lastCheckpointX    = player.x;
    lastCheckpointY    = player.y;
    lastCheckpointDist = distM;
    nextCheckpointM   += 60;
    spawnFx(player.x, player.y, '#44ffaa', 16);
  }
}

function resetInput() {
  // РЎР±СЂР°СЃС‹РІР°РµРј РІСЃРµ Р·Р°РІРёСЃС€РёРµ РєР»Р°РІРёС€Рё Рё РґР¶РѕР№СЃС‚РёРє
  ['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','w','a','s','d','W','A','S','D'].forEach(k => keys[k] = false);
  joy.active = false; joy.dx = 0; joy.dy = 0;
  mouse.down = false;
}

function respawnPlayer() {
  if (gameMode === 'sandbox') {
    // Р'РѕР·СЂРѕР¶РґР°РµРјСЃСЏ РІ Р±РµР·РѕРїР°СЃРЅРѕРј РјРµСЃС‚Рµ — РІ С†РµРЅС‚СЂРµ СЌРєСЂР°РЅР° РїРѕ X
    player.x = camXpx + VP.w / 2;
    // РС‰РµРј Р±Р»РёР¶Р°Р№С€РёР№ AIR С‚Р°Р№Р» РїРѕ РІРµСЂС‚РёРєР°Р»Рё
    const spawnC = Math.floor(player.x / T);
    let spawnR = Math.floor(player.y / T);
    for (let d = 0; d < ROWS; d++) {
      const col_ = grid[(spawnC) % POOL]; if (col_ && col_[spawnR + d] === AIR) { spawnR = spawnR + d; break; }
      const col2_ = grid[(spawnC) % POOL]; if (col2_ && col2_[spawnR - d] === AIR) { spawnR = spawnR - d; break; }
    }
    player.y = spawnR * T + T / 2;
    player.vx = 0; player.vy = 0;
  } else {
    camXpx   = lastCheckpointCamX;
    player.x = lastCheckpointX;
    player.y = lastCheckpointY;
    player.vx = 0; player.vy = 0;
    distM  = lastCheckpointDist;
    nextCheckpointM = lastCheckpointDist + 60;
  }
  player.dead = false;
  player.invincible = 180;
  oxygen = 100;
  resetInput();
}

function killPlayer() {
  if (player.dead) return;
  player.dead = true; player.invincible = 999;
  spawnFx(player.x, player.y, '#ff6060', 14);
  lives--;
  if (lives > 0) {
    setTimeout(() => respawnPlayer(), gameMode === 'sandbox' ? 300 : 900);
  } else {
    if (score > hiScore) hiScore = score;
    saveProgress();
    setTimeout(() => { state = 'dead'; }, 1200);
  }
}

// в”Ђв”Ђв”Ђ Draw в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function drawBackground() {
  const depthRatio = clamp(distM / 400, 0, 1);
  const g = ctx.createLinearGradient(0, 0, 0, VP.h);
  const top = `rgb(${Math.round(20*(1-depthRatio))},${Math.round(130*(1-depthRatio)+40*depthRatio)},${Math.round(200*(1-depthRatio)+80*depthRatio)})`;
  const bot = `rgb(${Math.round(10*(1-depthRatio))},${Math.round(90*(1-depthRatio)+20*depthRatio)},${Math.round(160*(1-depthRatio)+50*depthRatio)})`;
  g.addColorStop(0, top); g.addColorStop(1, bot);
  ctx.fillStyle = g; ctx.fillRect(0, 0, VP.w, VP.h);
}

function rockColor(c, r) {
  const base = Math.max(8, 52 - distM * 0.08);
  return `rgb(${base + (c*3+r*7)%9},${base-4+(r*5+c)%7},${base+8+(c*11+r)%13})`;
}

function drawTiles() {
  const startC = Math.floor(camXpx / T) - 1;
  const endC   = startC + Math.ceil(W / T) + 2;
  const startR = Math.floor(camYpx / T) - 1;
  const endR   = startR + Math.ceil(H / T) + 2;

  for (let c = startC; c <= endC; c++) {
    if (c < 0) continue;
    const ci = c % POOL;
    const sx = c * T - camXpx;

    for (let r = startR; r <= endR; r++) {
      if (r < 0 || r >= ROWS) continue;
      const sy = r * T - camYpx;

      if (grid[ci][r] === WALL) {
        ctx.fillStyle = rockColor(c, r); ctx.fillRect(sx, sy, T, T);
        ctx.fillStyle = 'rgba(0,0,0,0.2)'; ctx.fillRect(sx, sy, T, T);
        ctx.fillStyle = 'rgba(255,255,255,0.05)';
        ctx.fillRect(sx, sy, T, 3); ctx.fillRect(sx, sy, 3, T);

        const d = decorData[ci][r];
        if (d && d.type === 'decor') drawWallDecor(sx, sy, d.kind, d.phase + worldFrame * 0.012);
      }
    }
  }
}

function drawWallDecor(sx, sy, kind, phase) {
  ctx.save();
  if (kind === 0) {
    ctx.strokeStyle = 'rgba(220,80,80,0.65)'; ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(sx+T/2, sy+T); ctx.lineTo(sx+T/2, sy+T/2);
    ctx.lineTo(sx+T/2-6, sy+T/4); ctx.moveTo(sx+T/2, sy+T/2);
    ctx.lineTo(sx+T/2+7, sy+T/4); ctx.stroke();
  } else if (kind === 1) {
    ctx.strokeStyle = 'rgba(50,200,80,0.6)'; ctx.lineWidth = 2;
    const sw = Math.sin(phase) * 4;
    ctx.beginPath();
    ctx.moveTo(sx+T/2, sy+T);
    ctx.bezierCurveTo(sx+T/2+sw, sy+T*.7, sx+T/2-sw, sy+T*.4, sx+T/2+sw*.5, sy+4);
    ctx.stroke();
  } else {
    ctx.fillStyle = 'rgba(100,200,255,0.5)';
    ctx.beginPath();
    ctx.moveTo(sx+T/2, sy+4); ctx.lineTo(sx+T/2+5, sy+T/2);
    ctx.lineTo(sx+T/2, sy+T-4); ctx.lineTo(sx+T/2-5, sy+T/2);
    ctx.closePath(); ctx.fill();
  }
  ctx.restore();
}

function drawCheckpoints() {
  // Draw a vertical flag line at every 20m mark
  for (let m = 60; m <= distM + 120; m += 60) {
    const wx = m * 40; // world x of this checkpoint
    const sx = wx - camXpx;
    if (sx < -20 || sx > W + 20) continue;
    const passed = m <= lastCheckpointDist;
    const wave   = Math.sin(worldFrame * 0.1) * 6;
    ctx.save();
    // Pole
    ctx.strokeStyle = passed ? 'rgba(100,255,150,.6)' : 'rgba(255,220,80,.8)';
    ctx.lineWidth = 3;
    ctx.beginPath(); ctx.moveTo(sx, 0); ctx.lineTo(sx, VP.h); ctx.stroke();
    // Flag
    ctx.fillStyle = passed ? 'rgba(80,220,120,.85)' : 'rgba(255,200,50,.9)';
    const fy = VP.h / 2 - 30;
    ctx.beginPath();
    ctx.moveTo(sx, fy);
    ctx.lineTo(sx + 28 + wave, fy + 14);
    ctx.lineTo(sx, fy + 28);
    ctx.closePath(); ctx.fill();
    // Label
    ctx.fillStyle = '#fff'; ctx.font = 'bold 11px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText(`${m}m`, sx, fy + 40);
    ctx.restore();
  }
}

function drawEntities() {
  const startC = Math.floor(camXpx / T) - 1;
  const endC   = startC + Math.ceil(W / T) + 2;
  const startR = Math.floor(camYpx / T) - 1;
  const endR   = startR + Math.ceil(H / T) + 2;

  for (let c = startC; c <= endC; c++) {
    if (c < 0) continue;
    const ci  = c % POOL;
    const sx  = c * T + T/2 - camXpx;

    for (let r = startR; r <= endR; r++) {
      if (r < 0 || r >= ROWS) continue;
      const d = decorData[ci][r];
      if (!d || d.type === 'decor') continue;

      const baseY = r * T + T/2 - camYpx;

      if (d.type === 'pearl' && !d.collected) {
        const shine = 0.5 + 0.5 * Math.sin(worldFrame * 0.07 + d.phase);
        ctx.save(); ctx.translate(sx, baseY);
        const g = ctx.createRadialGradient(-3,-3,1,0,0,11);
        g.addColorStop(0, `rgba(255,255,230,${.9+shine*.1})`);
        g.addColorStop(1, 'rgba(200,170,100,.6)');
        ctx.fillStyle = g; ctx.beginPath(); ctx.arc(0,0,11,0,Math.PI*2); ctx.fill();
        ctx.restore();
      }

      if (d.type === 'bubble' && !d.collected) {
        ctx.save(); ctx.translate(sx, baseY);
        ctx.strokeStyle = 'rgba(140,220,255,.9)'; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.arc(0,0,14,0,Math.PI*2); ctx.stroke();
        ctx.fillStyle = 'rgba(180,240,255,.15)'; ctx.fill();
        ctx.fillStyle = 'rgba(255,255,255,.5)'; ctx.beginPath(); ctx.arc(-4,-4,4,0,Math.PI*2); ctx.fill();
        ctx.fillStyle = 'rgba(100,220,255,.9)'; ctx.font = 'bold 9px sans-serif'; ctx.textAlign = 'center';
        ctx.fillText('O₂', 0, 4);
        ctx.restore();
      }

      if (d.type === 'shark') {
        const esx = (d.px !== undefined ? d.px : c * T + T/2) - camXpx;
        const esy = d.py - camYpx;
        drawShark(esx, esy, worldFrame, d.vx || 0, d.aggroed);
      }

      if (d.type === 'jelly') {
        const esx = (d.px !== undefined ? d.px : c * T + T/2) - camXpx;
        const esy = (d.py !== undefined ? d.py : baseY) - camYpx;
        drawJelly(esx, esy, d.phase, d.aggroed);
      }

      if (d.type === 'mine') {
        drawMine(sx, baseY, d.phase + worldFrame * 0.03);
      }
    }
  }
}

function drawShark(sx, sy, f, vx, aggroed) {
  ctx.save(); ctx.translate(sx, sy);
  const facing = vx < -0.3 ? -1 : 1;
  ctx.scale(facing * (isMobile ? 0.9 : 1.5), isMobile ? 0.9 : 1.5);
  ctx.fillStyle = aggroed ? '#cc4444' : '#6888aa';
  ctx.beginPath(); ctx.ellipse(0,0,22,9,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = aggroed ? '#aa2222' : '#5577aa';
  ctx.beginPath(); ctx.moveTo(-18,0); ctx.lineTo(-30,-9); ctx.lineTo(-30,9); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(2,-8); ctx.lineTo(10,-17); ctx.lineTo(14,-8); ctx.closePath(); ctx.fill();
  ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(13,-2,3,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = aggroed ? '#ff0000' : '#111';
  ctx.beginPath(); ctx.arc(14,-2,1.8,0,Math.PI*2); ctx.fill();
  ctx.restore();
  // Aggro indicator
  if (aggroed) {
    ctx.save();
    ctx.font = 'bold 14px sans-serif'; ctx.textAlign = 'center';
    ctx.fillStyle = '#ff3333';
    ctx.fillText('!', sx, sy - 18);
    ctx.restore();
  }
}

function drawJelly(sx, sy, phase, aggroed) {
  const pulse = 0.85 + 0.15 * Math.sin(phase * 3);
  const jsc = isMobile ? 0.9 : 1.5;
  ctx.save(); ctx.translate(sx, sy); ctx.scale(pulse * jsc, jsc);
  ctx.fillStyle = aggroed ? 'rgba(255,60,60,.6)' : 'rgba(200,100,220,.5)';
  ctx.beginPath(); ctx.arc(0,0,16,Math.PI,0); ctx.closePath(); ctx.fill();
  ctx.strokeStyle = aggroed ? 'rgba(255,120,120,.8)' : 'rgba(230,140,255,.7)';
  ctx.lineWidth = 1.5; ctx.stroke();
  ctx.strokeStyle = aggroed ? 'rgba(255,80,80,.5)' : 'rgba(200,100,220,.45)';
  ctx.lineWidth = 1;
  for (let t = -2; t <= 2; t++) {
    ctx.beginPath(); ctx.moveTo(t*5, 0);
    ctx.bezierCurveTo(t*5 + Math.sin(phase+t)*6, 10, t*5, 22, t*5, 32);
    ctx.stroke();
  }
  ctx.restore();
  if (aggroed) {
    ctx.save();
    ctx.font = 'bold 14px sans-serif'; ctx.textAlign = 'center';
    ctx.fillStyle = '#ff3333';
    ctx.fillText('!', sx, sy - 22);
    ctx.restore();
  }
}

function drawMine(sx, sy, phase) {
  ctx.save(); ctx.translate(sx, sy);
  ctx.fillStyle = '#cc3333';
  ctx.beginPath(); ctx.arc(0,0,11,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle = '#ff6666'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(0,0,11,0,Math.PI*2); ctx.stroke();
  // Spikes
  ctx.strokeStyle = '#aa2222'; ctx.lineWidth = 2;
  for (let i = 0; i < 8; i++) {
    const a = phase + i * Math.PI / 4;
    ctx.beginPath(); ctx.moveTo(Math.cos(a)*11, Math.sin(a)*11);
    ctx.lineTo(Math.cos(a)*17, Math.sin(a)*17); ctx.stroke();
  }
  // Glint
  ctx.fillStyle = 'rgba(255,200,200,.5)';
  ctx.beginPath(); ctx.arc(-3,-3,4,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

function drawPlayer() {
  if (player.dead) return;
  if (player.invincible > 0 && !player.dead && Math.floor(frame/3)%2===0) return;

  const sx = player.x - camXpx;
  const sy = player.y - camYpx;
  const bob = Math.sin(swimPhase) * 2;

  ctx.save(); ctx.translate(sx, sy);

  // Scale up the sprite ~1.5x
  ctx.scale(isMobile ? 0.9 : 1.5, isMobile ? 0.9 : 1.5);

  // Fins
  ctx.fillStyle = '#cc6600';
  ctx.beginPath(); ctx.ellipse(-16, 4+bob, 8, 4, -0.4, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(-14, -3+bob, 8, 4, 0.4, 0, Math.PI*2); ctx.fill();

  // Body
  ctx.fillStyle = '#0d3d5c';
  ctx.beginPath(); ctx.roundRect(-8, -8+bob*.3, 18, 16, 4); ctx.fill();

  // Arms — attached to top/bottom edge of body
  const sway = Math.sin(swimPhase * 0.9) * 2;
  ctx.fillStyle = '#0d3d5c';
  ctx.beginPath(); ctx.ellipse(1, -8+sway, 6, 3, 0.15, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(1,  8-sway, 6, 3, -0.15, 0, Math.PI*2); ctx.fill();

  // Tank
  ctx.fillStyle = '#888'; ctx.beginPath(); ctx.roundRect(-6, -5+bob*.3, 6, 12, 2); ctx.fill();
  ctx.fillStyle = '#aaa'; ctx.beginPath(); ctx.roundRect(-5.5, -3+bob*.3, 4, 5, 1); ctx.fill();

  // Head
  ctx.fillStyle = '#b07830'; ctx.beginPath(); ctx.arc(10, 0+bob*.3, 9, 0, Math.PI*2); ctx.fill();

  // Mask
  ctx.fillStyle = '#0d3d5c'; ctx.beginPath(); ctx.ellipse(10, 0+bob*.3, 7, 9, Math.PI/2, -0.3, Math.PI+0.3); ctx.fill();
  ctx.fillStyle = 'rgba(160,220,255,.5)'; ctx.beginPath(); ctx.ellipse(11, 0+bob*.3, 5, 6.5, Math.PI/2, -0.3, Math.PI+0.3); ctx.fill();

  // Eyes
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(10, -3+bob*.3, 2, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(10,  3+bob*.3, 2, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#224';
  ctx.beginPath(); ctx.arc(10, -3+bob*.3, 1, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(10,  3+bob*.3, 1, 0, Math.PI*2); ctx.fill();

  // Regulator bubble
  if (frame % 22 < 4) {
    ctx.fillStyle = 'rgba(200,240,255,.6)'; ctx.beginPath(); ctx.arc(16, 6+bob*.3, 2.5, 0, Math.PI*2); ctx.fill();
  }
  ctx.restore();
}

function drawParticles() {
  for (const p of particles) {
    ctx.save(); ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }
}

// в”Ђв”Ђв”Ђ Mobile D-pad в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function dpadButtons() {
  const s = DPAD.size, g = DPAD.gap;
  const margin = 10;
  // РќРёР¶РЅРёР№ РїСЂР°РІС‹Р№ СѓРіРѕР»: РїСЂР°РІР°СЏ РєРЅРѕРїРєР° РїСЂРёР¶Р°С‚Р° Рє РїСЂР°РІРѕРјСѓ РєСЂР°СЋ
  const mx = W - margin - 2*s - g;  // С†РµРЅС‚СЂ РєСЂРµСЃС‚РѕРІРёРЅС‹ РїРѕ X
  // РќРёР¶РЅРёР№ РєСЂР°Р№ ▼ РєР°СЃР°РµС‚СЃСЏ РЅРёР¶РЅРµР№ РіСЂР°РЅРёС†С‹ VP
  const my = (VP.y + VP.h) - s * 3 - g * 2 - 10;
  return {
    up:    { x: mx,         y: my,           w: s, h: s, key: 'ArrowUp'    },
    left:  { x: mx - s - g, y: my + s + g,   w: s, h: s, key: 'ArrowLeft'  },
    right: { x: mx + s + g, y: my + s + g,   w: s, h: s, key: 'ArrowRight' },
    down:  { x: mx,         y: my + s*2+g*2, w: s, h: s, key: 'ArrowDown'  },
  };
}

// Pause button top-right
function pauseBtn() { return { x: W - 58, y: 8, w: 50, h: 50 }; }

function drawMobileControls() {
  if (state !== 'play') return;
  ctx.save();

  if (controlMode === 'dpad') {
    const btns = dpadButtons();
    for (const [dir, b] of Object.entries(btns)) {
      const pressed = keys[b.key];
      ctx.fillStyle = pressed ? 'rgba(255,255,255,.35)' : 'rgba(255,255,255,.15)';
      ctx.strokeStyle = 'rgba(255,255,255,.5)'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.roundRect(b.x, b.y, b.w, b.h, 10); ctx.fill(); ctx.stroke();
      ctx.fillStyle = pressed ? '#fff' : 'rgba(255,255,255,.8)';
      const arrowSz = Math.round(DPAD.size * 0.42);
      ctx.font = `bold ${arrowSz}px sans-serif`; ctx.textAlign = 'center';
      const arrows = { left:'◀', right:'▶', up:'▲', down:'▼' };
      ctx.fillText(arrows[dir], b.x + b.w/2, b.y + b.h/2 + arrowSz*0.35);
    }
  } else {
    // Joystick
    // Р”Р¶РѕР№СЃС‚РёРє РїРѕ СѓРјРѕР»С‡Р°РЅРёСЋ РЅР° СѓСЂРѕРІРЅРµ С†РµРЅС‚СЂР° РєСЂРµСЃС‚РѕРІРёРЅС‹ D-pad
    const _s = DPAD.size, _g = DPAD.gap;
    const _my = (VP.y + VP.h) - _s * 3 - _g * 2 - 10;
    const dpadCenterY = _my + _s + _g + _s / 2;
    const bx = joy.active ? joy.baseX : W - JOY_R - 15;
    const by = joy.active ? joy.baseY : dpadCenterY;
    // Base ring
    ctx.strokeStyle = 'rgba(255,255,255,.3)'; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.arc(bx, by, JOY_R, 0, Math.PI*2); ctx.stroke();
    ctx.fillStyle = 'rgba(255,255,255,.08)';
    ctx.beginPath(); ctx.arc(bx, by, JOY_R, 0, Math.PI*2); ctx.fill();
    // Thumb
    const tx = bx + joy.dx * JOY_R;
    const ty = by + joy.dy * JOY_R;
    ctx.fillStyle = joy.active ? 'rgba(100,210,255,.7)' : 'rgba(255,255,255,.25)';
    ctx.beginPath(); ctx.arc(tx, ty, 26, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,.6)'; ctx.lineWidth = 2;
    ctx.stroke();
  }

  // Pause button
  const pb = pauseBtn();
  ctx.fillStyle = paused ? 'rgba(255,220,80,.4)' : 'rgba(255,255,255,.15)';
  ctx.strokeStyle = 'rgba(255,255,255,.5)'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.roundRect(pb.x, pb.y, pb.w, pb.h, 10); ctx.fill(); ctx.stroke();
  ctx.fillStyle = '#fff'; ctx.font = '22px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText(paused ? '▶' : '⏸', pb.x + pb.w/2, pb.y + pb.h/2 + 8);
  ctx.restore();
}

// Touch в†' dpad keys
function getTouchCoords(t) {
  const r = canvas.getBoundingClientRect();
  return { tx: (t.clientX - r.left) * (W / r.width), ty: (t.clientY - r.top) * (H / r.height) };
}
function hitBtn(b, tx, ty) { return tx >= b.x && tx <= b.x+b.w && ty >= b.y && ty <= b.y+b.h; }

function joyUpdate(tx, ty) {
  const dx = tx - joy.baseX, dy = ty - joy.baseY;
  const d  = Math.sqrt(dx*dx + dy*dy);
  const DEAD = 8; // deadzone px
  if (d < DEAD) { joy.dx = 0; joy.dy = 0; return; }
  const clamped = Math.min(d, JOY_R);
  joy.dx = (dx / d) * (clamped / JOY_R);
  joy.dy = (dy / d) * (clamped / JOY_R);
}

function checkMenuButtons(tx, ty) {
  const hb = window._helpBtn;
  if (hb && tx>=hb.x && tx<=hb.x+hb.w && ty>=hb.y && ty<=hb.y+hb.h) { openHelp(); return true; }
  const nb = window._nameBtn;
  if (nb && tx>=nb.x && tx<=nb.x+nb.w && ty>=nb.y && ty<=nb.y+nb.h) { openNameInput(); return true; }
  const fb = window._friendsBtn;
  if (fb && tx>=fb.x && tx<=fb.x+fb.w && ty>=fb.y && ty<=fb.y+fb.h) { openFriendsPanel(); return true; }
  const lbBtn2 = window._lbBtn;
  if (lbBtn2 && tx>=lbBtn2.x && tx<=lbBtn2.x+lbBtn2.w && ty>=lbBtn2.y && ty<=lbBtn2.y+lbBtn2.h) { openLeaderboard(); return true; }
  const lb = window._langBtn;
  if (lb && tx>=lb.x && tx<=lb.x+lb.w && ty>=lb.y && ty<=lb.y+lb.h) {
    lang = lang === 'en' ? 'ru' : 'en';
    localStorage.setItem('deepdiver_lang', lang);
    return true;
  }
  const bd = window._menuBtnDpad, bj = window._menuBtnJoy;
  if (bd && tx>=bd.x && tx<=bd.x+bd.w && ty>=bd.y && ty<=bd.y+bd.h) { controlMode='dpad'; return true; }
  if (bj && tx>=bj.x && tx<=bj.x+bj.w && ty>=bj.y && ty<=bj.y+bj.h) { controlMode='joystick'; return true; }
  const bc = window._btnCampaign, bs = window._btnSandbox;
  if (bc && tx>=bc.x && tx<=bc.x+bc.w && ty>=bc.y && ty<=bc.y+bc.h) { gameMode='campaign'; startGame(); return true; }
  if (bs && tx>=bs.x && tx<=bs.x+bs.w && ty>=bs.y && ty<=bs.y+bs.h) { gameMode='sandbox';  startGame(); return true; }
  return false;
}
// РћР±СЂР°С‚РЅР°СЏ СЃРѕРІРјРµСЃС‚РёРјРѕСЃС‚СЊ
function checkControlButtons(tx, ty) { return checkMenuButtons(tx, ty); }

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const t0 = e.changedTouches[0];
  const { tx, ty } = getTouchCoords(t0);

  if (state === 'menu')    { if (!checkControlButtons(tx, ty)) startGame(); return; }
  if (state === 'dead') {
    const mb = window._menuBackBtn;
    if (mb && tx>=mb.x && tx<=mb.x+mb.w && ty>=mb.y && ty<=mb.y+mb.h) { state='menu'; wins=0; level=1; return; }
    if (!checkControlButtons(tx, ty)) startGame();
    return;
  }
  if (state === 'win') {
    const wb = window._winMenuBtn;
    if (wb && tx>=wb.x && tx<=wb.x+wb.w && ty>=wb.y && ty<=wb.y+wb.h) { state='menu'; return; }
    startGame(); return;
  }
  if (state === 'levelup') { level++; wins = 0; startGame(); return; }
  if (state !== 'play') return;

  // РљРЅРѕРїРєР° РіР»Р°РІРЅРѕРіРѕ РјРµРЅСЋ РІ РїР°СѓР·Рµ
  if (paused) {
    const pmb = window._pauseMenuBtn;
    if (pmb && tx>=pmb.x && tx<=pmb.x+pmb.w && ty>=pmb.y && ty<=pmb.y+pmb.h) {
      paused = false; state = 'menu'; return;
    }
  }

  for (const t of e.changedTouches) {
    const { tx: cx, ty: cy } = getTouchCoords(t);
    const pb = pauseBtn();
    if (hitBtn(pb, cx, cy)) { paused = !paused; continue; }

    if (controlMode === 'joystick') {
      if (!joy.active) {
        joy.active = true; joy.touchId = t.identifier;
        joy.baseX = cx; joy.baseY = cy; joy.dx = 0; joy.dy = 0;
      }
    } else {
      let onDpad = false;
      for (const b of Object.values(dpadButtons())) {
        if (hitBtn(b, cx, cy)) { keys[b.key] = true; onDpad = true; }
      }
      // С‚Р°Рї РІРЅРµ d-pad — РЅРµ СѓРїСЂР°РІР»СЏРµС‚ РёРіСЂРѕРєРѕРј
    }
  }
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  for (const t of e.changedTouches) {
    const { tx, ty } = getTouchCoords(t);
    if (controlMode === 'joystick') {
      if (joy.active && t.identifier === joy.touchId) joyUpdate(tx, ty);
    } else {
      let onDpad = false;
      for (const b of Object.values(dpadButtons())) { if (hitBtn(b, tx, ty)) onDpad = true; }
      // С‚Р°Рї РІРЅРµ d-pad — РёРіРЅРѕСЂРёСЂСѓРµРј
    }
  }
}, { passive: false });

canvas.addEventListener('touchend', e => {
  e.preventDefault();
  for (const t of e.changedTouches) {
    if (controlMode === 'joystick') {
      if (t.identifier === joy.touchId) { joy.active = false; joy.dx = 0; joy.dy = 0; }
    } else {
      const { tx, ty } = getTouchCoords(t);
      let anyDpad = false;
      for (const b of Object.values(dpadButtons())) {
        if (hitBtn(b, tx, ty)) { keys[b.key] = false; anyDpad = true; }
      }
      if (!anyDpad) mouse.down = false;
    }
  }
}, { passive: false });

function drawBorder() {
  const pulse = 0.75 + 0.25 * Math.sin(worldFrame * 0.07);
  ctx.save();
  ctx.strokeStyle = `rgba(255,30,30,${pulse})`;
  ctx.lineWidth = isMobile ? 3 : 10;
  ctx.shadowColor = '#ff0000';
  ctx.shadowBlur = isMobile ? 8 : 24;
  const boff = 2;
  ctx.strokeRect(VP.x + boff, VP.y + boff, VP.w - boff*2, VP.h - boff*2);
  ctx.restore();
}

function drawHUD() {
  const cx = VP.w / 2;
  const diff = difficulty(Math.floor(camXpx / T));
  const label = diff < 0.25 ? (distM >= 100 ? t('diff_normal') : t('diff_easy')) : diff < 0.5 ? t('diff_medium') : diff < 0.75 ? t('diff_hard') : t('diff_danger');
  const diffCol = diff < 0.25 ? '#88ff88' : diff < 0.5 ? '#ffee44' : diff < 0.75 ? '#ff9944' : '#ff4444';

  if (isMobile) {
    // в”Ђв”Ђ РљРѕРјРїР°РєС‚РЅС‹Р№ HUD — С‚РѕРЅРєР°СЏ РїРѕР»СѓРїСЂРѕР·СЂР°С‡РЅР°СЏ РїРѕР»РѕСЃРєР° СЃРІРµСЂС…Сѓ в”Ђв”Ђ
    const ph = 26, py = 0;
    // O₂ Р±Р°СЂ РїРѕ С†РµРЅС‚СЂСѓ — РїРѕР»РѕРІРёРЅР° С€РёСЂРёРЅС‹ РїРѕР»РѕСЃС‹
    const bw = VP.w * 0.5, bh = ph, bx2 = cx - bw / 2, by2 = py;

    // Р›РµРІР°СЏ Рё РїСЂР°РІР°СЏ С‡Р°СЃС‚Рё — РјРµРЅРµРµ РЅРµРїСЂРѕР·СЂР°С‡РЅС‹Рµ
    ctx.fillStyle = 'rgba(0,0,0,.40)';
    ctx.fillRect(0, py, bx2, ph);
    ctx.fillRect(bx2 + bw, py, VP.w - (bx2 + bw), ph);
    // Р¦РµРЅС‚СЂР°Р»СЊРЅР°СЏ Р·РѕРЅР° — С‚С'РјРЅР°СЏ РїРѕРґР»РѕР¶РєР° РїРѕРґ Р±Р°СЂ
    ctx.fillStyle = 'rgba(0,0,0,.88)';
    ctx.fillRect(bx2, py, bw, ph);

    // Р”РёСЃС‚Р°РЅС†РёСЏ СЃР»РµРІР°, СЃС‡С'С‚ СЃРїСЂР°РІР°
    ctx.fillStyle = '#88ddff'; ctx.font = 'bold 9px monospace'; ctx.textAlign = 'left';
    ctx.fillText(`➡${distM}m`, 6, py + 10);
    ctx.fillStyle = '#ffe680'; ctx.font = 'bold 9px monospace'; ctx.textAlign = 'right';
    ctx.fillText(`◆${score}`, VP.w - 6, py + 10);
    ctx.fillStyle = oxygen > 50 ? 'rgba(68,221,170,.45)' : oxygen > 25 ? 'rgba(255,204,68,.45)' : 'rgba(255,85,68,.45)';
    ctx.fillRect(bx2, by2, bw * oxygen / 100, bh);

    // Р–РёР·РЅРё РїРѕ С†РµРЅС‚СЂСѓ РїРѕРґ Р±Р°СЂРѕРј
    const livesStr = lives >= 99 ? '🤿∞' : '🤿'.repeat(Math.min(lives,3)) + '🩶'.repeat(Math.max(0,3-lives));
    ctx.font = 'bold 11px sans-serif'; ctx.textAlign = 'center';
    ctx.fillStyle = '#ffffff';
    ctx.shadowColor = '#88ffee'; ctx.shadowBlur = 6;
    ctx.fillText(livesStr, cx, py + 22);
    ctx.shadowBlur = 0;

  } else {
    // в”Ђв”Ђ РџРѕР»РЅС‹Р№ HUD РґР»СЏ РґРµСЃРєС‚РѕРїР° — РїРѕР»СѓРїСЂРѕР·СЂР°С‡РЅР°СЏ РїРѕР»РѕСЃРєР° СЃРІРµСЂС…Сѓ в”Ђв”Ђ
    const panelH = 42, panelY = 0;
    ctx.fillStyle = 'rgba(0,0,0,.6)';
    ctx.fillRect(0, panelY, VP.w, panelH);

    ctx.fillStyle = '#88ddff'; ctx.font = 'bold 20px monospace'; ctx.textAlign = 'left';
    ctx.fillText(`➡ ${distM}m`, 16, panelY + 28);
    ctx.fillStyle = diffCol; ctx.font = 'bold 18px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText(label, cx, panelY + 28);
    ctx.fillStyle = '#ffe680'; ctx.font = 'bold 20px monospace'; ctx.textAlign = 'right';
    ctx.fillText(`◆ ${score}`, VP.w - 16, panelY + 28);

    // O₂ bar
    const bw = Math.min(400, VP.w * 0.5), bh = 20, bx = cx - bw/2, by = panelY + panelH + 4;
    ctx.fillStyle = 'rgba(0,0,0,.55)';
    ctx.beginPath(); ctx.roundRect(bx, by, bw, bh, 8); ctx.fill();
    ctx.fillStyle = oxygen > 50 ? '#44ddaa' : oxygen > 25 ? '#ffcc44' : '#ff5544';
    ctx.beginPath(); ctx.roundRect(bx+3, by+3, (bw-6)*oxygen/100, bh-6, 5); ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,.9)'; ctx.font = 'bold 12px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('O₂', cx, by + 14);

    // Lives + checkpoint
    ctx.font = 'bold 22px sans-serif'; ctx.textAlign = 'center';
    const heartsY = by + bh + 20;
    ctx.fillText(lives >= 99 ? '🤿 ∞' : '🤿'.repeat(Math.min(lives,3)) + '🩶'.repeat(Math.max(0, 3-lives)), cx, heartsY);
    const toNext = nextCheckpointM - distM;
    ctx.fillStyle = 'rgba(100,255,180,.8)'; ctx.font = 'bold 11px sans-serif';
    ctx.fillText(t('next_cp')(toNext), cx, heartsY + 16);

    // Threat bar РІРЅРёР·Сѓ
    const threatW = 260, threatH = 26, tx = cx - threatW/2, ty = VP.h - 34;
    ctx.fillStyle = 'rgba(0,0,0,.5)';
    ctx.beginPath(); ctx.roundRect(tx, ty, threatW, threatH, 6); ctx.fill();
    ctx.fillStyle = '#ffaaaa'; ctx.font = 'bold 13px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText(t('danger_bar')(Math.round(diff*5)), cx, ty + 18);
  }

  // в”Ђв”Ђ Low O₂ warning в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  if (oxygen < 25 && Math.floor(frame/20)%2===0) {
    ctx.fillStyle = 'rgba(255,80,60,.15)'; ctx.fillRect(0, 0, VP.w, VP.h);
    ctx.fillStyle = '#ff5544'; ctx.font = 'bold 15px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText(t('low_oxy'), cx, VP.h/2 - 14);
  }
}

function drawMenu() {
  // РњР°СЃС€С‚Р°Р±: РјРѕР±РёР»СЊРЅС‹Р№ РіРѕСЂРёР·РѕРЅС‚Р°Р»СЊРЅС‹Р№ — РјР°Р»РµРЅСЊРєРёР№ H (~360), РґРµСЃРєС‚РѕРї — Р±РѕР»СЊС€РѕР№
  const compact = isMobile && W > H; // РіРѕСЂРёР·РѕРЅС‚Р°Р»СЊРЅС‹Р№ С‚РµР»РµС„РѕРЅ
  const scale = Math.min(H / 500, W / 700, 1);

  const g = ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#001830'); g.addColorStop(1,'#000a18');
  ctx.fillStyle = g; ctx.fillRect(0,0,W,H);
  ctx.fillStyle = 'rgba(140,220,255,.1)';
  for (let i = 0; i < 18; i++) {
    const bx = (i*137 + worldFrame*.25) % W;
    const by = H - ((i*83 + worldFrame*(0.3+i*.02)) % H);
    ctx.beginPath(); ctx.arc(bx, by, 3+(i%5), 0, Math.PI*2); ctx.fill();
  }

  if (compact) {
    // в”Ђв”Ђ Р“РѕСЂРёР·РѕРЅС‚Р°Р»СЊРЅС‹Р№ С‚РµР»РµС„РѕРЅ: РґРІСѓС…РєРѕР»РѕРЅРѕС‡РЅС‹Р№ layout в”Ђв”Ђ
    const lx = W * 0.27, rx = W * 0.73; // Р»РµРІР°СЏ Рё РїСЂР°РІР°СЏ РєРѕР»РѕРЅРєРё

    // Р›РµРІР°СЏ РєРѕР»РѕРЅРєР°: Р·Р°РіРѕР»РѕРІРѕРє + РѕРїРёСЃР°РЅРёРµ
    ctx.fillStyle = '#80dfff'; ctx.font = `bold ${Math.round(26*scale+14)}px sans-serif`; ctx.textAlign = 'center';
    ctx.fillText(t('title'), lx, H * 0.18);
    ctx.fillStyle = '#aaffee'; ctx.font = `${Math.round(11*scale+8)}px sans-serif`;
    ctx.fillText(t('subtitle'), lx, H * 0.30);
    ctx.fillStyle = '#cceeff'; ctx.font = `${Math.round(9*scale+8)}px sans-serif`;
    ctx.fillText(t('desc1'), lx, H * 0.44);
    ctx.fillText(t('desc2'), lx, H * 0.55);
    ctx.fillStyle = '#aaffcc'; ctx.font = `${Math.round(8*scale+7)}px sans-serif`;
    ctx.fillText(t('controls_hint_m'), lx, H * 0.67);

    // РџСЂР°РІР°СЏ РєРѕР»РѕРЅРєР°: РєРЅРѕРїРєРё СѓРїСЂР°РІР»РµРЅРёСЏ + СЂРµР¶РёРјС‹
    if (isMobile) drawControlSelector(H * 0.10, rx);

    const bw = Math.min(150, W * 0.20), bh = Math.round(38 * scale + 16), gap = 14;
    const b1x = rx - bw - gap/2, b2x = rx + gap/2;
    const by = H * (isMobile ? 0.50 : 0.40);

    ctx.fillStyle = 'rgba(80,160,255,.25)';
    ctx.strokeStyle = '#55aaff'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.roundRect(b1x, by, bw, bh, 10); ctx.fill(); ctx.stroke();
    ctx.fillStyle = '#fff'; ctx.font = `bold ${Math.round(13*scale+9)}px sans-serif`; ctx.textAlign = 'center';
    ctx.fillText(t('campaign'), b1x + bw/2, by + bh*0.42);
    ctx.fillStyle = 'rgba(255,255,255,.55)'; ctx.font = `${Math.round(8*scale+7)}px sans-serif`;
    ctx.fillText(t('campaign_sub_m'), b1x + bw/2, by + bh*0.78);

    ctx.fillStyle = 'rgba(80,220,120,.2)';
    ctx.strokeStyle = '#44dd88'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.roundRect(b2x, by, bw, bh, 10); ctx.fill(); ctx.stroke();
    ctx.fillStyle = '#fff'; ctx.font = `bold ${Math.round(13*scale+9)}px sans-serif`;
    ctx.fillText(t('sandbox'), b2x + bw/2, by + bh*0.42);
    ctx.fillStyle = 'rgba(255,255,255,.55)'; ctx.font = `${Math.round(8*scale+7)}px sans-serif`;
    ctx.fillText(t('sandbox_sub_m'), b2x + bw/2, by + bh*0.78);

    window._btnCampaign = { x: b1x, y: by, w: bw, h: bh };
    window._btnSandbox  = { x: b2x, y: by, w: bw, h: bh };

    if (hiScore > 0) {
      ctx.fillStyle = '#ffe680'; ctx.font = `${Math.round(8*scale+7)}px sans-serif`; ctx.textAlign = 'center';
      ctx.fillText(`${t('best')}: ${hiScore}  |  Lv${level}  |  ${t('wins_lbl')}: ${wins}/5`, rx, by + bh + 18);
    }

  } else {
    // в”Ђв”Ђ Р”РµСЃРєС‚РѕРї / РїРѕСЂС‚СЂРµС‚РЅС‹Р№ С‚РµР»РµС„РѕРЅ: РѕРґРЅРѕРєРѕР»РѕРЅРѕС‡РЅС‹Р№ layout в”Ђв”Ђ
    const titleSize = Math.round(Math.min(40, H * 0.08));

    // Р—Р°РіРѕР»РѕРІРѕРє Рё РїРѕРґР·Р°РіРѕР»РѕРІРѕРє
    ctx.fillStyle = '#80dfff'; ctx.font = `bold ${titleSize}px sans-serif`; ctx.textAlign = 'center';
    ctx.fillText(t('title'), W/2, H * 0.20);
    ctx.fillStyle = '#aaffee'; ctx.font = `${Math.round(titleSize*0.38)}px sans-serif`;
    ctx.fillText(t('subtitle'), W/2, H * 0.28);

    // РљРЅРѕРїРєРё СЃСЂР°Р·Сѓ РїРѕРґ РІС‚РѕСЂРѕР№ СЃС‚СЂРѕРєРѕР№
    const bw = Math.min(190, W * 0.26), bh = Math.round(54 * scale + 10), gap = 20;
    const b1x = W/2 - bw - gap/2, b2x = W/2 + gap/2;
    const by = H * 0.34;

    ctx.fillStyle = 'rgba(80,160,255,.25)';
    ctx.strokeStyle = '#55aaff'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.roundRect(b1x, by, bw, bh, 12); ctx.fill(); ctx.stroke();
    ctx.fillStyle = '#fff'; ctx.font = `bold ${Math.round(titleSize*0.42)}px sans-serif`; ctx.textAlign = 'center';
    ctx.fillText(t('campaign'), b1x + bw/2, by + bh*0.42);
    ctx.fillStyle = 'rgba(255,255,255,.55)'; ctx.font = `${Math.round(titleSize*0.28)}px sans-serif`;
    ctx.fillText(t('campaign_sub'), b1x + bw/2, by + bh*0.78);

    ctx.fillStyle = 'rgba(80,220,120,.2)';
    ctx.strokeStyle = '#44dd88'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.roundRect(b2x, by, bw, bh, 12); ctx.fill(); ctx.stroke();
    ctx.fillStyle = '#fff'; ctx.font = `bold ${Math.round(titleSize*0.42)}px sans-serif`;
    ctx.fillText(t('sandbox'), b2x + bw/2, by + bh*0.42);
    ctx.fillStyle = 'rgba(255,255,255,.55)'; ctx.font = `${Math.round(titleSize*0.28)}px sans-serif`;
    ctx.fillText(t('sandbox_sub'), b2x + bw/2, by + bh*0.78);

    window._btnCampaign = { x: b1x, y: by, w: bw, h: bh };
    window._btnSandbox  = { x: b2x, y: by, w: bw, h: bh };

    // РћРїРёСЃР°РЅРёРµ Рё РїРѕРґСЃРєР°Р·РєРё РЅРёР¶Рµ РєРЅРѕРїРѕРє
    const descY = by + bh + H * 0.05;
    ctx.fillStyle = '#cceeff'; ctx.font = `${Math.round(titleSize*0.34)}px sans-serif`; ctx.textAlign = 'center';
    ctx.fillText(t('desc1'), W/2, descY);
    ctx.fillText(t('desc2'), W/2, descY + H * 0.07);
    ctx.fillStyle = '#aaffcc'; ctx.font = `${Math.round(titleSize*0.32)}px sans-serif`;
    ctx.fillText(t('controls_hint'), W/2, descY + H * 0.14);

    if (isMobile) drawControlSelector(descY + H * 0.21);

    // РџСЂРµРґСѓРїСЂРµР¶РґРµРЅРёРµ РїРѕСЂС‚СЂРµС‚РЅРѕР№ РѕСЂРёРµРЅС‚Р°С†РёРё
    if (H > W) {
      ctx.save();
      ctx.fillStyle = `rgba(255,20,20,${0.7 + 0.3 * Math.sin(worldFrame * 0.1)})`;
      ctx.font = `bold ${Math.round(titleSize*0.45)}px sans-serif`; ctx.textAlign = 'center';
      ctx.shadowColor = '#ff0000'; ctx.shadowBlur = 16;
      ctx.fillText(t('rotate'), W/2, H * 0.06);
      ctx.shadowBlur = 0;
      ctx.restore();
    }

    if (hiScore > 0) {
      ctx.fillStyle = '#ffe680'; ctx.font = `${Math.round(titleSize*0.30)}px sans-serif`; ctx.textAlign = 'center';
      ctx.fillText(`${t('best')}: ${hiScore}  |  ${t('level_lbl')}: ${level}  |  ${t('wins_lbl')}: ${wins}/5`, W/2, by + bh + 22);
    }
  }
  drawLangBtn();
  drawHelpBtn();
  drawNameBtn();
  drawFriendsBtn();
  drawLeaderboardBtn();
  drawFriendsLeaderboard();
}

function drawLeftBtn(label, byOffset, winKey) {
  ctx.save();
  ctx.font = 'bold 14px sans-serif';
  const tw = ctx.measureText(label).width;
  const bw = tw + 28, bh = 32, bx = 12, by = byOffset;
  ctx.fillStyle = 'rgba(255,255,255,.12)';
  ctx.strokeStyle = 'rgba(255,255,255,.45)'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.roundRect(bx, by, bw, bh, 10); ctx.fill(); ctx.stroke();
  ctx.fillStyle = '#fff'; ctx.textAlign = 'center';
  ctx.fillText(label, bx + bw / 2, by + bh * 0.68);
  ctx.restore();
  window[winKey] = { x: bx, y: by, w: bw, h: bh };
}

function drawFriendsBtn() {
  drawLeftBtn(lang === 'ru' ? '👥 Друзья' : '👥 Friends', 52, '_friendsBtn');
}

function drawLeaderboardBtn() {
  drawLeftBtn(lang === 'ru' ? '🏆 Чарт' : '🏆 Chart', 92, '_lbBtn');
}

function drawFriendsLeaderboard() {
  if (!friends.length) return;
  const sorted = [...friends].sort((a,b) => b.s - a.s).slice(0,5);
  const cx = W / 2, startY = H * 0.88;
  const rowH = 20, pad = 12;
  const boxW = Math.min(300, W * 0.5), boxH = rowH * sorted.length + pad * 2 + 20;
  const bx = cx - boxW/2, by = startY - boxH;
  ctx.save();
  ctx.fillStyle = 'rgba(0,0,0,.45)';
  ctx.beginPath(); ctx.roundRect(bx, by, boxW, boxH, 10); ctx.fill();
  ctx.fillStyle = '#80dfff'; ctx.font = 'bold 12px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText(lang === 'ru' ? '👥 Рекорды друзей' : '👥 Friends leaderboard', cx, by + pad + 8);
  sorted.forEach((f, i) => {
    const y = by + pad + 22 + i * rowH;
    ctx.fillStyle = '#aaddff'; ctx.font = '12px sans-serif'; ctx.textAlign = 'left';
    ctx.fillText(`${i+1}. 🤿 ${f.n}`, bx + 12, y);
    ctx.fillStyle = '#ffe680'; ctx.textAlign = 'right';
    ctx.fillText(`◆ ${f.s}`, bx + boxW - 12, y);
  });
  ctx.restore();
}

function drawNameBtn() {
  const label = playerName ? `🤿 ${playerName}` : (lang === 'ru' ? '✏ Никнейм' : '✏ Nickname');
  ctx.save();
  ctx.font = 'bold 14px sans-serif';
  const tw = ctx.measureText(label).width;
  const bw = tw + 28, bh = 32, bx = 12, by = 12;
  ctx.fillStyle = 'rgba(255,255,255,.12)';
  ctx.strokeStyle = 'rgba(255,255,255,.45)'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.roundRect(bx, by, bw, bh, 10); ctx.fill(); ctx.stroke();
  ctx.fillStyle = '#fff'; ctx.textAlign = 'center';
  ctx.fillText(label, bx + bw / 2, by + bh * 0.68);
  ctx.restore();
  window._nameBtn = { x: bx, y: by, w: bw, h: bh };
}

function drawHelpBtn() {
  const bw = 38, bh = 32, bx = W - bw - 12, by = 52;
  ctx.save();
  ctx.fillStyle = 'rgba(255,255,255,.12)';
  ctx.strokeStyle = 'rgba(255,255,255,.45)'; ctx.lineWidth = 2;

function drawLangBtn() {
  const bw = 72, bh = 32, bx = W - bw - 12, by = 12;
  ctx.fillStyle = 'rgba(255,255,255,.12)';
  ctx.strokeStyle = 'rgba(255,255,255,.45)'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.roundRect(bx, by, bw, bh, 10); ctx.fill(); ctx.stroke();
  ctx.fillStyle = '#fff'; ctx.font = 'bold 14px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText(t('lang_btn'), bx + bw / 2, by + bh * 0.68);
  window._langBtn = { x: bx, y: by, w: bw, h: bh };
}

function drawControlSelector(cy, cx) {
  cx = cx || W/2;
  const scale = Math.min(H / 500, W / 700, 1);
  const btnW = Math.round(Math.min(120, W * 0.17) * scale + 30);
  const btnH = Math.round(28 * scale + 12);
  const gap = 12;
  const b1x = cx - btnW - gap/2, b2x = cx + gap/2;
  const fs = Math.round(9 * scale + 7);
  ctx.fillStyle = '#88ddff'; ctx.font = `bold ${fs}px sans-serif`; ctx.textAlign = 'center';
  ctx.fillText(t('controls_lbl'), cx, cy - 5);
  ctx.fillStyle = controlMode==='dpad' ? 'rgba(80,200,255,.5)' : 'rgba(255,255,255,.1)';
  ctx.strokeStyle = controlMode==='dpad' ? '#80dfff' : 'rgba(255,255,255,.3)';
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.roundRect(b1x, cy, btnW, btnH, 8); ctx.fill(); ctx.stroke();
  ctx.fillStyle = '#fff'; ctx.font = `bold ${fs}px sans-serif`;
  ctx.fillText('рџ•№ D-Pad', b1x + btnW/2, cy + btnH*0.65);
  ctx.fillStyle = controlMode==='joystick' ? 'rgba(80,200,255,.5)' : 'rgba(255,255,255,.1)';
  ctx.strokeStyle = controlMode==='joystick' ? '#80dfff' : 'rgba(255,255,255,.3)';
  ctx.beginPath(); ctx.roundRect(b2x, cy, btnW, btnH, 8); ctx.fill(); ctx.stroke();
  ctx.fillStyle = '#fff';
  ctx.fillText('🎮 Joystick', b2x + btnW/2, cy + btnH*0.65);
  window._menuBtnDpad = { x: b1x, y: cy, w: btnW, h: btnH };
  window._menuBtnJoy  = { x: b2x, y: cy, w: btnW, h: btnH };
}

function drawDead() {
  const compact = isMobile && W > H;
  const s = Math.min(H / 500, W / 700, 1);
  const titleSz = Math.round(Math.min(56, H * 0.13));
  const textSz  = Math.round(titleSz * 0.36);
  const smallSz = Math.round(titleSz * 0.30);

  ctx.fillStyle = 'rgba(0,0,20,.72)'; ctx.fillRect(0,0,W,H);
  ctx.fillStyle = '#ff1111'; ctx.font = `bold ${titleSz}px sans-serif`; ctx.textAlign = 'center';
  ctx.shadowColor = '#ff0000'; ctx.shadowBlur = 20;
  ctx.fillText(t('game_over'), W/2, H * 0.20);
  ctx.shadowBlur = 0;
  if (playerName) {
    ctx.fillStyle = '#aaddff'; ctx.font = `${Math.round(titleSz*0.38)}px sans-serif`;
    ctx.fillText(`🤿 ${playerName}`, W/2, H * 0.30);
  }

  if (compact) {
    // Р”РІРµ РєРѕР»РѕРЅРєРё
    const lx = W * 0.30, rx = W * 0.70;
    ctx.fillStyle = '#ffe680'; ctx.font = `${textSz}px sans-serif`;
    ctx.fillText(`${t('score_lbl')}: ${score}`, lx, H * 0.42);
    ctx.fillText(`${t('dist_lbl')}: ${distM}m`, lx, H * 0.57);
    ctx.fillStyle = '#aaffcc'; ctx.font = `${textSz}px sans-serif`;
    ctx.fillText(`${t('best')}: ${hiScore}`, lx, H * 0.72);

    if (isMobile) drawControlSelector(H * 0.32, rx);

    ctx.fillStyle = '#88ddff'; ctx.font = `bold ${smallSz}px sans-serif`;
    ctx.fillText(t('play_again_m'), rx, H * 0.72);

    const mw = Math.min(180, W * 0.24), mh = Math.round(34 * s + 8);
    const mx = rx - mw/2, my = H * 0.80;
    ctx.fillStyle = 'rgba(255,255,255,.1)';
    ctx.strokeStyle = 'rgba(255,255,255,.4)'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.roundRect(mx, my, mw, mh, 8); ctx.fill(); ctx.stroke();
    ctx.fillStyle = 'rgba(255,255,255,.8)'; ctx.font = `${smallSz}px sans-serif`;
    ctx.fillText(t('main_menu'), rx, my + mh * 0.65);
    window._menuBackBtn = { x: mx, y: my, w: mw, h: mh };
  } else {
    ctx.fillStyle = '#ffe680'; ctx.font = `${textSz}px sans-serif`;
    ctx.fillText(`${t('score_lbl')}: ${score}`, W/2, H * 0.38);
    ctx.fillText(`${t('dist_lbl')}: ${distM}m`, W/2, H * 0.47);
    ctx.fillStyle = '#aaffcc'; ctx.font = `${textSz}px sans-serif`;
    ctx.fillText(`${t('best')}: ${hiScore}`, W/2, H * 0.56);
    if (isMobile) drawControlSelector(H * 0.63);
    ctx.fillStyle = '#88ddff'; ctx.font = `bold ${textSz}px sans-serif`;
    ctx.fillText(t('play_again'), W/2, H * 0.80);

    const mw = Math.min(220, W * 0.30), mh = Math.round(40 * s + 5);
    const mx = W/2 - mw/2, my = H * 0.87;
    ctx.fillStyle = 'rgba(255,255,255,.1)';
    ctx.strokeStyle = 'rgba(255,255,255,.4)'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.roundRect(mx, my, mw, mh, 10); ctx.fill(); ctx.stroke();
    ctx.fillStyle = 'rgba(255,255,255,.8)'; ctx.font = `${smallSz}px sans-serif`;
    ctx.fillText(t('main_menu_btn'), W/2, my + mh * 0.65);
    window._menuBackBtn = { x: mx, y: my, w: mw, h: mh };
  }
}

function drawWin() {
  const titleSz = Math.round(Math.min(54, H * 0.12));
  const textSz  = Math.round(titleSz * 0.44);
  const pipSz   = Math.round(titleSz * 0.60);
  ctx.fillStyle = 'rgba(0,20,10,.8)'; ctx.fillRect(0,0,W,H);
  ctx.fillStyle = '#44ffaa'; ctx.font = `bold ${titleSz}px sans-serif`; ctx.textAlign = 'center';
  ctx.shadowColor = '#00ff88'; ctx.shadowBlur = 28;
  ctx.fillText(t('victory'), W/2, H * 0.20);
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#fff'; ctx.font = `${textSz}px sans-serif`;
  ctx.fillText(`${t('dist_lbl')}: 500m`, W/2, H * 0.36);
  ctx.fillText(`${t('score_lbl')}: ${score}`, W/2, H * 0.47);
  ctx.font = `${pipSz}px sans-serif`;
  ctx.fillText('🏅'.repeat(wins) + '⬜'.repeat(5 - wins), W/2, H * 0.60);
  ctx.fillStyle = '#aaffcc'; ctx.font = `${textSz}px sans-serif`;
  ctx.fillText(`${t('wins_to')}: ${wins} / 5 ${t('to_next')}`, W/2, H * 0.72);
  ctx.fillStyle = '#ffee66'; ctx.font = `bold ${textSz}px sans-serif`;
  ctx.fillText(t('next_round'), W/2, H * 0.78);

  // Main Menu button
  const bw = Math.min(220, W * 0.30), bh = Math.round(textSz * 1.1);
  const bx = W/2 - bw/2, by = H * 0.86;
  ctx.fillStyle = 'rgba(255,255,255,.1)';
  ctx.strokeStyle = 'rgba(255,255,255,.4)'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.roundRect(bx, by, bw, bh, 10); ctx.fill(); ctx.stroke();
  ctx.fillStyle = '#fff'; ctx.font = `${textSz}px sans-serif`; ctx.textAlign = 'center';
  ctx.fillText(t('menu_btn'), W/2, by + bh * 0.65);
  window._winMenuBtn = { x: bx, y: by, w: bw, h: bh };
}

function drawLevelUp() {
  const titleSz = Math.round(Math.min(52, H * 0.12));
  const textSz  = Math.round(titleSz * 0.52);
  const smallSz = Math.round(titleSz * 0.36);
  ctx.fillStyle = 'rgba(0,0,30,.85)'; ctx.fillRect(0,0,W,H);
  ctx.fillStyle = '#ffdd00'; ctx.font = `bold ${titleSz}px sans-serif`; ctx.textAlign = 'center';
  ctx.shadowColor = '#ffaa00'; ctx.shadowBlur = 30;
  ctx.fillText(t('new_level'), W/2, H * 0.22);
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#fff'; ctx.font = `${textSz}px sans-serif`;
  ctx.fillText(`${t('level_lbl')} ${level}  →  ${level + 1}`, W/2, H * 0.42);
  ctx.fillStyle = '#ffaaaa'; ctx.font = `${smallSz}px sans-serif`;
  ctx.fillText(t('enemies_faster'), W/2, H * 0.58);
  ctx.fillStyle = '#88ddff'; ctx.font = `bold ${textSz * 0.9}px sans-serif`;
  ctx.fillText(t('lets_go'), W/2, H * 0.76);
}

// в”Ђв”Ђв”Ђ Main loop в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function loop() {
  try {
  worldFrame++;
  ctx.clearRect(0,0,W,H);

  if (state === 'menu') {
    drawMenu();
  } else {
    update();

    // Р РёСЃСѓРµРј Р»Р°Р±РёСЂРёРЅС‚ + HUD СЃС‚СЂРѕРіРѕ РІРЅСѓС‚СЂРё РІСЊСЋРїРѕСЂС‚Р°
    ctx.save();
    ctx.translate(VP.x, VP.y);
    ctx.beginPath(); ctx.rect(0, 0, VP.w, VP.h); ctx.clip();
    drawBackground();
    drawTiles();
    drawCheckpoints();
    drawEntities();
    drawPlayer();
    drawParticles();
    drawHUD();
    ctx.restore();

    // Р Р°РјРєР° Рё UI РїРѕРІРµСЂС… (РІ СЌРєСЂР°РЅРЅС‹С… РєРѕРѕСЂРґРёРЅР°С‚Р°С…)
    // drawBorder(); — СѓР±СЂР°РЅРѕ
    if (paused) drawPause();
    if (state === 'dead')    drawDead();
    if (state === 'win')     drawWin();
    if (state === 'levelup') drawLevelUp();
    drawMobileControls();
  }
  } catch(e) {
    ctx.fillStyle='rgba(0,0,0,.8)'; ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#ff4444'; ctx.font='16px monospace'; ctx.textAlign='center';
    ctx.fillText('ERROR: '+e.message, W/2, H/2);
    ctx.fillText((e.stack||'').split('\n')[1]||'', W/2, H/2+24);
    console.error(e);
  }
  requestAnimationFrame(loop);
}

// Р'Р»РѕРєРёСЂСѓРµРј СЃРєСЂРѕР»Р», Р·СѓРј Рё РєРѕРЅС‚РµРєСЃС‚РЅРѕРµ РјРµРЅСЋ РЅР° РјРѕР±РёР»СЊРЅС‹С…
document.addEventListener('gesturestart',  e => e.preventDefault(), { passive: false });
document.addEventListener('gesturechange', e => e.preventDefault(), { passive: false });
document.addEventListener('gestureend',    e => e.preventDefault(), { passive: false });
document.addEventListener('contextmenu',   e => e.preventDefault());
document.addEventListener('touchmove',     e => e.preventDefault(), { passive: false });

// РџРѕРґСЃС‚СЂР°РёРІР°РµРј СЂР°Р·РјРµСЂ РїСЂРё РїРѕРІРѕСЂРѕС‚Рµ СЌРєСЂР°РЅР°
window.addEventListener('orientationchange', () => {
  setTimeout(() => {
    W = window.innerWidth; H = window.innerHeight;
    canvas.width = W; canvas.height = H;
    ROWS = Math.ceil(H / T) + 2;
  }, 200);
});

initGrid();
generateUntil(POOL);
requestAnimationFrame(loop);
</script>
</body>
</html>
